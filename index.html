<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#c4b0e8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lumi✨Routine">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Lumi✨Routine</title>
<style>
/* ─ RESET ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  color:#1e3a5f;
  min-height:100vh;
  overscroll-behavior:none;
  /* Fixed gradient - no background-attachment:fixed (causes blank on some browsers) */
  background:linear-gradient(160deg,#ede0ff 0%,#d8e8ff 50%,#c8e0ff 100%) center/cover no-repeat;
  background-color:#e4e8ff;
}
button{font-family:inherit;cursor:pointer;transition:transform .13s,opacity .13s}
button:active{transform:scale(.95)}
input,textarea{font-family:inherit;font-size:14px;color:#1e3a5f;outline:none;transition:border-color .18s,box-shadow .18s}

/* ─ CSS VARS ────────────────────────────────────────── */
:root{
  --card:rgba(255,255,255,.88);
  --card-s:rgba(255,255,255,.96);
  --text:#1e3a5f;--muted:#7a90b8;--muted-lt:#b4c8e0;
  --border:rgba(180,180,220,.40);--border-md:rgba(150,155,210,.55);
  --sky:#3b9fd6;--sky-dk:#2276ae;--sky-lt:#7ac6ee;--sky-pale:rgba(200,235,255,.55);
  --lav:#8b7fd4;--lav-dk:#6a5fb0;--lav-lt:#b8b0e8;--lav-pale:rgba(220,210,255,.50);
  --grn:#4cba7a;--grn-lt:#9de0bd;--grn-pale:rgba(200,245,220,.6);
  --r:14px;
}

/* ─ LAYOUT ──────────────────────────────────────────── */
#app{max-width:480px;margin:0 auto;min-height:100vh}
/* NO opacity animation - causes blank screen on some browsers */
.page{display:none}
.page.active{display:block}

/* ─ STICKY HEADER ───────────────────────────────────── */
.sticky-hdr{
  position:sticky;top:0;z-index:50;
  background:rgba(238,230,255,.9);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border-md);
}

/* ─ NAV BUTTON ───────────────────────────────────────── */
.nav-btn{
  width:36px;height:36px;border-radius:50%;
  border:1.5px solid var(--border-md);background:var(--card-s);
  color:var(--lav);font-size:18px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.nav-btn:hover{background:var(--lav-pale);border-color:var(--lav-lt)}

/* ─ INPUTS ──────────────────────────────────────────── */
.inp{
  width:100%;padding:9px 12px;
  background:rgba(255,255,255,.7);border:1.5px solid var(--border-md);border-radius:10px;
}
.inp:focus{border-color:var(--lav-lt);box-shadow:0 0 0 3px rgba(139,127,212,.14);background:#fff}
textarea.inp{resize:vertical;line-height:1.6}

/* ─ 9-COL CALENDAR ─────────────────────────────────── */
.cal-8{display:grid;grid-template-columns:34px repeat(7,1fr);gap:3px;align-items:center}
.cal-hdr-cell{text-align:center;font-size:10px;font-weight:700;padding:3px 0;color:var(--muted)}
.cal-hdr-cell.wknd{color:var(--lav)}
.cal-hdr-cell.meta{color:var(--lav-lt);font-size:9px}
.prog-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border-radius:10px;padding:2px;transition:transform .13s;aspect-ratio:1}
.prog-cell:hover{transform:scale(1.08)}
.wk-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border-radius:11px;padding:3px 2px;border:1.5px solid var(--border);background:var(--card);transition:transform .13s,box-shadow .13s;aspect-ratio:1}
.wk-cell:hover{transform:scale(1.06);box-shadow:0 3px 12px rgba(139,127,212,.22)}
.wk-cell.cur{border-color:var(--lav);background:var(--lav-pale)}
.wk-cell.has-wk{border-color:var(--lav);background:rgba(235,230,255,.75)}
.wk-num{font-size:10px;font-weight:800;color:var(--lav);line-height:1.1;letter-spacing:-.2px}
.wk-icon{font-size:14px;line-height:1;margin-top:2px}
.wk-icon{font-size:11px;line-height:1;margin-top:1px}
.cal-day{aspect-ratio:1;border-radius:10px;border:1.5px solid var(--border);background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;font-weight:600;cursor:pointer;position:relative;overflow:hidden;transition:transform .13s,box-shadow .13s;gap:0}
.cal-day:hover{transform:scale(1.07);box-shadow:0 4px 12px rgba(100,120,220,.2)}
.cal-day.today{background:linear-gradient(135deg,rgba(155,140,220,.9) 0%,rgba(100,175,220,.9) 100%);color:#fff;border-color:transparent}
.cal-day.has-data{background:var(--card)}
.cal-day.other-mo{color:var(--muted-lt);background:rgba(255,255,255,.35);border-color:rgba(180,180,220,.2)}
.cal-day.cur-week{border-color:var(--lav-lt)}
.day-dot{position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:var(--lav)}
.day-ring{display:block;flex-shrink:0}
.cal-day-ring{padding:0!important}
.day-pct{font-size:7px;font-weight:700;color:rgba(140,128,200,.75);text-align:center;line-height:1;margin-top:1px}

/* ─ SECTION CARDS ───────────────────────────────────── */
.sect-card{margin-bottom:12px;border-radius:var(--r);overflow:hidden;background:var(--card-s);border:1px solid var(--border-md);box-shadow:0 3px 12px rgba(120,100,200,.07)}
.sect-hdr{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sect-hdr-left{display:flex;align-items:center;gap:8px}
.sect-hdr-right{display:flex;align-items:center;gap:7px}
.sect-mini-bar{width:40px;height:5px;background:rgba(180,180,220,.3);border-radius:3px;overflow:hidden}
.sect-mini-fill{height:100%;border-radius:3px;background:var(--lav);transition:width .4s}
.sect-mini-fill.done{background:var(--grn)}
.sect-title{font-size:15px;font-weight:700}
.sect-count{font-size:11px;font-weight:600;color:var(--muted)}
.sect-pct{font-size:11px;font-weight:700;color:var(--lav);min-width:26px;text-align:right}
.sect-pct.done{color:var(--grn)}
.bg-morn{background:linear-gradient(135deg,rgba(220,240,255,.7) 0%,rgba(255,248,220,.7) 100%)}
.bg-aft{background:linear-gradient(135deg,rgba(255,250,220,.7) 0%,rgba(255,235,200,.7) 100%)}
.bg-eve{background:linear-gradient(135deg,rgba(220,235,255,.7) 0%,rgba(230,220,255,.7) 100%)}
.bg-ngt{background:linear-gradient(135deg,rgba(230,220,255,.7) 0%,rgba(215,205,250,.7) 100%)}
.bg-refl{background:linear-gradient(135deg,rgba(85,100,200,.38) 0%,rgba(148,72,205,.38) 100%)}

/* ─ CHECKLIST ───────────────────────────────────────── */
.check-row{width:100%;display:flex;align-items:center;gap:12px;padding:9px 16px;background:none;border:none;text-align:left;transition:background .13s}
.check-row:hover{background:rgba(139,127,212,.06)}
.check-row.hd-row{padding:9px 16px 3px;font-size:13px;font-weight:700;color:var(--lav);display:block}
.check-row.sub-row{padding:6px 16px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-left:3px solid var(--lav-lt);background:var(--lav-pale);display:block}
.check-row.lbl-row{padding:2px 16px 2px 42px;font-size:12px;color:var(--muted);display:block}
.check-row.fever-row{margin:4px 12px;padding:8px 12px;border-radius:10px;background:rgba(139,127,212,.08);border-left:3px solid var(--lav-lt);display:block}
.fever-title{font-size:12px;font-weight:700;color:var(--lav-dk);font-style:italic}
.fever-sub{font-size:11px;color:var(--muted);margin-top:2px}
.cb{width:22px;height:22px;border-radius:7px;border:2px solid var(--border-md);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s cubic-bezier(.34,1.56,.64,1)}
.cb.on{background:linear-gradient(135deg,var(--lav),var(--sky));border-color:transparent}
.cb svg{opacity:0;transform:scale(0);transition:all .18s}
.cb.on svg{opacity:1;transform:scale(1)}
.cb-text{font-size:14px;transition:all .18s}
.cb-text.done{text-decoration:line-through;color:var(--muted)}

/* ─ PROGRESS ────────────────────────────────────────── */
.top-bar{height:6px;background:rgba(180,180,220,.3);border-radius:3px;overflow:hidden}
.top-bar-fill{height:100%;border-radius:3px;background:linear-gradient(to right,var(--sky-lt),var(--lav));transition:width .4s}
.top-bar-fill.high{background:var(--grn)}

/* ─ REFLECTION ──────────────────────────────────────── */
.refl-group{margin-bottom:18px}
.refl-label{font-size:13px;font-weight:700;margin-bottom:10px}
.refl-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.refl-num{font-size:12px;color:var(--muted);width:16px;text-align:center;flex-shrink:0}

/* ─ WEEKLY LEFT PANEL ───────────────────────────────── */
.wk-overlay{position:fixed;inset:0;z-index:200;background:rgba(255,255,255,.01);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .22s;pointer-events:none}
.wk-overlay.open{opacity:1;pointer-events:all}
.wk-panel{width:100%;max-width:480px;background:linear-gradient(180deg,#f5f0ff 0%,#eff6ff 100%);border-radius:22px 22px 0 0;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.22,1,.36,1);box-shadow:0 -8px 40px rgba(80,60,160,.18)}
.wk-overlay.open .wk-panel{transform:translateY(0)}
.wk-hdr{padding:6px 16px 14px;border-bottom:1px solid rgba(180,170,220,.35);flex-shrink:0;background:rgba(248,244,255,.95)}
.wk-handle{width:42px;height:4px;background:var(--lav-lt);border-radius:2px;margin:10px auto 12px;flex-shrink:0}
.wk-hdr{padding:18px 16px 14px;border-bottom:1px solid rgba(180,170,220,.35);flex-shrink:0;background:rgba(248,244,255,.95)}
.wk-body{overflow-y:auto;flex:1;padding:0 0 40px}
/* ─ WEEKLY UNIFIED SECTIONS ─────────────────────────── */
.wk-section{padding:16px 16px 4px}
.wk-section+.wk-section{border-top:1px solid rgba(180,170,220,.25)}
.wk-sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.wk-sec-title{font-size:15px;font-weight:800;color:#2a1f5a;flex:1}
.wk-done-badge{background:rgba(200,245,220,.8);color:#2a7a46;border:1px solid rgba(150,220,180,.5);font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.wk-sec-body{margin-bottom:8px}
.wk-add-btn{display:block;width:100%;padding:10px;border:1.5px dashed rgba(180,170,220,.45);background:rgba(240,236,255,.4);border-radius:10px;color:var(--lav-dk);font-size:13px;font-weight:700;cursor:pointer;transition:background .12s,border-color .12s;margin-bottom:8px}
.wk-add-btn:hover{background:var(--lav-pale);border-color:var(--lav-lt)}

/* ─ HABIT TRACKER TABLE ─────────────────────────────── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;background:#fff;border-radius:12px;border:1px solid rgba(180,170,220,.35);box-shadow:0 2px 8px rgba(120,100,200,.06)}
.tbl{border-collapse:collapse;width:100%;min-width:480px}
.tbl th{color:#2a1f5a;font-size:11px;font-weight:700;padding:8px 4px;text-align:center;white-space:nowrap;position:relative}
/* Section 1: Habit — lavender */
.tbl th.th-habit{text-align:left;padding-left:10px;min-width:80px;background:rgba(215,205,255,.55);border-radius:12px 0 0 0}
/* Section 2: Condition cols — lavender→sky gradient across 3 columns */
.tbl th.th-cond-over{background:rgba(200,215,255,.5);min-width:30px;max-width:40px;width:32px}
.tbl th.th-cond-ach {background:rgba(190,230,255,.5);min-width:30px;max-width:40px;width:32px}
.tbl th.th-cond-fail{background:rgba(180,240,245,.5);min-width:30px;max-width:40px;width:32px}
/* Section 3: Weekday cols — mint */
.tbl th.th-day-col{min-width:22px;width:22px;padding:7px 2px;background:rgba(200,245,230,.5)}
/* Section 4: Weekend cols — also mint (same) */
.tbl th.th-wknd{background:rgba(200,245,230,.5)}
/* Last col (delete) — deep lavender */
.tbl th.th-del-col{width:24px;padding:4px;background:rgba(185,245,235,.5);border-radius:0 12px 0 0}
.tbl td{padding:4px 3px;border-bottom:1px solid rgba(200,195,230,.18);vertical-align:middle}
.tbl td input{width:100%;padding:4px 6px;font-size:12px;border-radius:7px;border:1.5px solid rgba(200,195,230,.35);background:rgba(255,255,255,.9);color:var(--text);outline:none;transition:border-color .18s}
.tbl td input::placeholder{color:rgba(140,135,170,.7);font-style:italic}
.tbl td input:focus{border-color:var(--lav-lt);background:#fff}
.tbl td.td-habit input{font-size:13px;font-weight:600;min-width:70px}
.tbl td.td-cond input{font-size:11px;min-width:44px;padding:4px 5px}
.tbl td.td-day{text-align:center;padding:3px 1px;width:24px}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:last-child td:first-child{border-radius:0 0 0 12px}
.tbl tr:last-child td:last-child{border-radius:0 0 12px 0}
/* Day cycle button — 4 states */
.day-cyc{width:22px;height:22px;border-radius:6px;border:1.5px solid rgba(180,180,220,.45);background:rgba(245,244,252,.8);display:flex;align-items:center;justify-content:center;margin:0 auto;cursor:pointer;font-size:11px;font-weight:700;color:var(--muted);line-height:1;user-select:none;-webkit-user-select:none;transition:border-color .13s,background .13s}
.day-cyc.s1{border-color:rgba(60,160,100,.4);background:rgba(195,240,215,.6);color:#1a6a40}
.day-cyc.s2{border-color:rgba(200,80,160,.4);background:rgba(255,215,240,.6);color:#8a1060}
.day-cyc.s3{border-color:rgba(220,60,60,.4);background:rgba(255,200,200,.5);color:#a02020}
.day-cyc{width:22px;height:22px;border-radius:6px;border:1.5px solid rgba(180,180,220,.45);background:transparent;display:flex;align-items:center;justify-content:center;margin:0 auto;cursor:pointer;font-size:15px;line-height:1;user-select:none;-webkit-user-select:none;transition:border-color .13s}
.day-cyc.s1{border-color:rgba(220,60,60,.4);background:rgba(255,200,200,.2)}
.day-cyc.s2{border-color:rgba(220,60,60,.35);background:rgba(255,170,180,.15)}

/* ─ BUTTONS ─────────────────────────────────────────── */
.btn-cta{background:linear-gradient(135deg,rgba(155,140,220,.9) 0%,rgba(100,175,220,.9) 100%);color:#fff;border:none;border-radius:30px;padding:14px 38px;font-size:15px;font-weight:700;box-shadow:0 4px 16px rgba(120,100,200,.22);letter-spacing:.3px}
.btn-cta:hover{box-shadow:0 6px 22px rgba(120,100,200,.32)}
.btn-add-row{width:100%;padding:11px;border:1.5px dashed var(--lav-lt);background:var(--lav-pale);border-radius:10px;color:var(--lav);font-size:13px;font-weight:700;transition:border-color .13s}
.btn-add-row:hover{border-color:var(--lav);background:rgba(210,200,255,.4)}
.btn-del{width:22px;height:22px;border-radius:50%;border:none;background:rgba(255,100,80,.12);color:#e05544;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.btn-del:hover{background:rgba(255,100,80,.22)}
.btn-goal-check{width:30px;height:30px;border-radius:9px;border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s cubic-bezier(.34,1.56,.64,1)}
.btn-goal-check.off{background:rgba(180,180,220,.3)}
.btn-goal-check.on{background:linear-gradient(135deg,var(--lav),var(--sky))}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;letter-spacing:.3px}
.wk-prog-bar{height:6px;background:rgba(180,180,220,.3);border-radius:3px;overflow:hidden}
.wk-prog-fill{height:100%;background:linear-gradient(to right,var(--lav-lt),var(--sky));border-radius:3px;transition:width .4s}
.wk-prog-fill.done{background:var(--grn)}
.weekly-card{background:var(--card-s);border-radius:var(--r);border:1px solid var(--border-md);overflow:hidden;box-shadow:0 2px 10px rgba(120,100,200,.07)}
.goal-row{display:flex;align-items:center;gap:10px;padding:9px 14px}
.goal-row+.goal-row{border-top:1px solid var(--border)}
.complete-banner{background:var(--grn-pale);border:1.5px solid var(--grn-lt);border-radius:var(--r);padding:14px 18px;text-align:center;font-size:15px;font-weight:700;color:#166534;margin-bottom:12px}

/* ─ MISSION TRACKER ──────────────────────────────────── */
.mission-card{background:var(--card-s);border-radius:12px;border:1px solid var(--border-md);overflow:hidden;margin-bottom:8px;box-shadow:0 2px 8px rgba(120,100,200,.06)}
.mission-hdr{display:flex;align-items:center;gap:8px;padding:9px 13px;border-bottom:1px solid rgba(180,170,220,.25)}
.cnt-ctrl{display:flex;align-items:center;gap:5px;flex-shrink:0}
.cnt-btn{width:24px;height:24px;border-radius:7px;border:1.5px solid var(--border-md);background:rgba(255,255,255,.8);color:var(--lav-dk);font-size:12px;display:flex;align-items:center;justify-content:center}
.cnt-btn:hover{background:var(--lav-pale);border-color:var(--lav-lt)}
.cnt-val{min-width:26px;text-align:center;font-size:15px;font-weight:800;color:var(--lav-dk)}
.mission-checks-wrap{padding:8px 13px 12px;display:flex;flex-wrap:wrap;align-items:center;gap:5px}
.mc{width:22px;height:22px;border-radius:6px;border:1.5px solid rgba(180,170,220,.5);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s cubic-bezier(.34,1.56,.64,1)}
.mc.mc-on{background:linear-gradient(135deg,var(--lav),var(--sky));border-color:transparent}
.mc svg{opacity:0;transform:scale(0);transition:all .18s}
.mc.mc-on svg{opacity:1;transform:scale(1)}
.mc-sep{height:20px;width:0;border-left:2px dotted rgba(180,170,220,.6);margin:0 3px;flex-shrink:0}
.btn-add-mission{padding:6px 12px;border-radius:10px;border:1.5px dashed var(--lav-lt);background:var(--lav-pale);color:var(--lav-dk);font-size:12px;font-weight:700;flex-shrink:0;white-space:nowrap}
.btn-add-mission:hover{border-color:var(--lav);background:rgba(210,200,255,.4)}
.miss-empty{text-align:center;padding:16px;color:var(--muted);font-size:13px}

/* ─ TEMPLATE PANEL ───────────────────────────────────── */
.tpanel{position:fixed;top:0;right:0;bottom:0;z-index:300;width:min(340px,100vw);background:linear-gradient(160deg,#f8f4ff 0%,#eff6ff 100%);box-shadow:-8px 0 40px rgba(80,60,160,.22);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.22,1,.36,1)}
.tpanel.open{transform:translateX(0)}
.tpanel-hdr{padding:20px 18px 14px;border-bottom:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:10px}
.tpanel-body{overflow-y:auto;flex:1;padding:14px 12px 30px}
.tmpl-card{background:var(--card-s);border-radius:12px;border:1.5px solid var(--border-md);padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.tmpl-card.cur{border-color:var(--lav);background:var(--lav-pale)}
.tmpl-card-info{flex:1;min-width:0}
.tmpl-card-name{font-size:14px;font-weight:700;color:var(--text)}
.tmpl-card-sub{font-size:11px;color:var(--muted);margin-top:1px}
.btn-apply{padding:5px 13px;border-radius:20px;border:none;background:linear-gradient(135deg,var(--lav),var(--sky));color:#fff;font-size:12px;font-weight:700;white-space:nowrap}
.btn-tmpl-new{width:100%;padding:12px;border:1.5px dashed var(--lav-lt);background:var(--lav-pale);border-radius:12px;color:var(--lav-dk);font-size:13px;font-weight:700;margin-top:4px}

/* ─ TEMPLATE EDITOR ──────────────────────────────────── */
.tedit-panel{position:fixed;top:0;right:0;bottom:0;z-index:400;width:min(400px,100vw);background:linear-gradient(160deg,#faf7ff 0%,#f2f8ff 100%);box-shadow:-8px 0 40px rgba(80,60,160,.22);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.22,1,.36,1)}
.tedit-panel.open{transform:translateX(0)}
.tedit-hdr{padding:16px 16px 12px;border-bottom:1.5px solid var(--border);flex-shrink:0}
.tedit-name-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}

var S={

  save:  function(k,v){try{localStorage.setItem('drt:'+k,JSON.stringify(v));}catch(e){}},
  has:   function(k){try{return !!localStorage.getItem('drt:'+k);}catch(e){return false;}},
  /* hasReal: true only if user actually interacted (checked item OR typed text) */
  hasReal: function(k){
    try{
      var r=localStorage.getItem('drt:'+k);if(!r)return false;
      var d=JSON.parse(r);
      /* Check routines for any checked item */
      var rts=d.routines||{};
      var checked=Object.keys(rts).some(function(sk){return (rts[sk]||[]).some(function(i){return i.checked;});});
      if(checked)return true;
      /* Check reflection for any non-empty text */
      var refl=d.reflection||{};
      if(refl.lesson&&refl.lesson.trim())return true;
      if((refl.good||[]).some(function(v){return v&&v.trim();}))return true;
      if((refl.tomorrow||[]).some(function(v){return v&&v.trim();}))return true;
      return false;
    }catch(e){return false;}
  },
  wLoad: function(k){try{var r=localStorage.getItem('week-'+k);return r?JSON.parse(r):null;}catch(e){return null;}},
  wSave: function(k,v){try{localStorage.setItem('week-'+k,JSON.stringify(v));}catch(e){}},

};

function pad(n){return ('0'+n).slice(-2);}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function getWeekNum(ds){var d=new Date(ds+'T12:00:00'),day=d.getDay()||7;d.setDate(d.getDate()+4-day);var y1=new Date(d.getFullYear(),0,1);return Math.ceil((((d-y1)/86400000)+1)/7);}
function getWeekStart(ds){var d=new Date(ds+'T12:00:00'),day=d.getDay();d.setDate(d.getDate()+(day===0?-6:1-day));return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function addDays(ds,n){var d=new Date(ds+'T12:00:00');d.setDate(d.getDate()+n);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}

function mkDay(date){
  var routines={};
  /* 항상 저장된 기본 템플릿 사용 (tpl_default도 포함) */
  var defId = getDefaultTmplId();

  SECTIONS.forEach(function(s){
    var src = defTmpl ? (defTmpl.sections[s.key]||[]) : (ROUTINE_TEMPLATE[s.key]||[]);
    routines[s.key]=src.map(function(item){
      var copy=Object.assign({},item);
      if(copy.type==='check') copy.checked=false;
      return copy;
    });
  });
  return {date:date,routines:routines,reflection:{good:['','',''],lesson:'',tomorrow:['','','']}};
}
function getDay(date){var ex=S.load(date);if(ex)return ex;return mkDay(date);}

/* Habit tracker row — days stored as 0=empty,1=circle,2=heart */
function mkHabitRow(){return {habit:'',over:'',achieve:'',fail:'',days:{mon:0,tue:0,wed:0,thu:0,fri:0,sat:0,sun:0}};}

/* Normalize legacy boolean or out-of-range values */
function normDay(v){if(v===true)return 1;if(!v||v===false)return 0;var n=parseInt(v);return isNaN(n)?0:Math.min(3,Math.max(0,n));}

function mkMission(){return {name:'',target:0,checks:[]};}

function mkWeek(ws){
  var goals=[],tracker=[],missions=[];
  for(var i=0;i<3;i++)goals.push({text:'',completed:false});
  for(var j=0;j<3;j++)tracker.push(mkHabitRow());
  for(var k=0;k<3;k++)missions.push(mkMission());
  return {weekStart:ws,goals:goals,tracker:tracker,missions:missions};
}
function getWeek(ws){
  var ex=S.wLoad(ws);
  if(ex){
    if(!ex.missions)ex.missions=[];
    /* Pad to at least 3 default missions */
    while(ex.missions.length<3)ex.missions.push(mkMission());
    /* migrate old tracker field names */
    (ex.tracker||[]).forEach(function(r){
      if(!r.habit&&r.task)r.habit=r.task;
      if(!r.over&&r.condition)r.over=r.condition;
      if(!r.achieve&&r.success)r.achieve=r.success;
    });
    return ex;
  }
  var w=mkWeek(ws); return w; /* do NOT auto-save — only save on actual user interaction */
}

/* ══════════════════════════════════
   PROGRESS
══════════════════════════════════ */
function dayProg(data){
  if(!data)return 0;var all=[],done=0;
  Object.keys(data.routines).forEach(function(k){
    data.routines[k].forEach(function(item){if(item.type==='check'){all.push(item);if(item.checked)done++;}});
  });
  return all.length?Math.round(done/all.length*100):0;
}
function weekProg(wData){
  if(!wData)return 0;
  var gc=0,gt=0,hc=0,ht=0,mc=0,mt=0;
  (wData.goals||[]).forEach(function(g){gt++;if(g.completed)gc++;});
  (wData.tracker||[]).forEach(function(r){
    ht++;
    if(DAY_KEYS.every(function(d){var v=normDay(r.days?r.days[d]:0);return v===1||v===2;}))hc++;
  });
  /* Mission: count all missions; done if target>0 and checks complete */
  (wData.missions||[]).forEach(function(m){
    mt++;
    var tgt=m.target||0;
    if(tgt>0&&(m.checks||[]).filter(Boolean).length>=tgt)mc++;
  });
  var total=gt+ht+mt;return total?Math.round((gc+hc+mc)/total*100):0;
}

/* ── Navigation stack v2 ─────────────────────────────────────────────
   Rules (PRD v2):
   - Stack max 3 entries: [calendar?, day/weekly?, day/weekly?]
   - Push only if stack.length < 2 (so at most 2 entries before current page)
   - Don't push if top of stack is already the page we're pushing
   - popNav: pop one, if empty → calendar (no flicker: 1 render() only)
──────────────────────────────────────────────────────────────────── */
function navPush(){
  /* Only push if stack has fewer than 2 entries AND top isn't same page */
  if(ST.navStack.length>=2) return;
  var top=ST.navStack.length>0?ST.navStack[ST.navStack.length-1]:null;
  if(top&&top.page===ST.page) return; /* avoid duplicate */
  ST.navStack.push({
    page:ST.page,
    currentDate:ST.currentDate,
    weekModalStart:ST.weekModalStart
  });
}
function popNav(){
  var fromPage=ST.page;
  var fromDate=ST.currentDate;
  var prev=ST.navStack.pop();
  if(!prev){ ST.page='calendar'; render(); return; }
  ST.page=prev.page;
  if(prev.page==='day'&&prev.currentDate){
    ST.currentDate=prev.currentDate;
    ST.dayData=getDay(prev.currentDate);
  } else if(prev.page==='weekly'&&prev.weekModalStart){
    ST.weekModalStart=prev.weekModalStart;
    ST.weekData=getWeek(prev.weekModalStart);
  }
  /* Skip if we'd land on the same page+date we just came from → pop once more */
  if(ST.page===fromPage && ST.currentDate===fromDate){
    popNav(); return;
  }
  render(); /* exactly 1 render() call — no flicker */
}


function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

}

function buildWeeks(yr,mo){
  var first=new Date(yr,mo,1),fd=first.getDay(),startOff=fd===0?-6:1-fd;
  var start=new Date(yr,mo,1+startOff);
  var last=new Date(yr,mo+1,0),ld=last.getDay(),endOff=ld===0?0:7-ld;
  var end=new Date(yr,mo+1,0+endOff);
  var weeks=[],d=new Date(start),today=todayStr();
  while(d<=end){
    var week=[];
    for(var i=0;i<7;i++){
      var ds=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
      week.push({ds:ds,day:d.getDate(),inMonth:d.getMonth()===mo&&d.getFullYear()===yr,isToday:ds===today});
      d.setDate(d.getDate()+1);
    }
    weeks.push(week);
  }
  return weeks;
}

function collectAllData(){
  var data={version:2,exportedAt:new Date().toISOString(),daily:{},weekly:{},templates:[]};
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    if(k&&k.match(/^drt:\d{4}-\d{2}-\d{2}$/)){try{data.daily[k]=JSON.parse(localStorage.getItem(k));}catch(e){}}
    if(k&&k.match(/^week-\d{4}-\d{2}-\d{2}$/)){try{data.weekly[k]=JSON.parse(localStorage.getItem(k));}catch(e){}}
  }
  try{data.templates=JSON.parse(localStorage.getItem('drt:templates')||'[]');}catch(e){data.templates=[];}
  try{data.defaultTmplId=localStorage.getItem('drt:defaultTmplId')||'tpl_default';}catch(e){data.defaultTmplId='tpl_default';}
  return data;
}

function esc2(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function buildDailySheet(data){
  var rows='<Row><Cell ss:StyleID="hdr"><Data ss:Type="String">날짜</Data></Cell>'+
    '<Cell ss:StyleID="hdr"><Data ss:Type="String">섹션</Data></Cell>'+
    '<Cell ss:StyleID="hdr"><Data ss:Type="String">항목</Data></Cell>'+
    '<Cell ss:StyleID="hdr"><Data ss:Type="String">완료</Data></Cell></Row>\n';
  var dates=Object.keys(data.daily).sort();
  dates.forEach(function(dk){
    var d=data.daily[dk];
    var dateStr=dk.replace('drt:','');
    if(!d||!d.routines)return;
    ['morning','afternoon','evening','night'].forEach(function(sk){
      (d.routines[sk]||[]).forEach(function(item){
        if(item.type==='check'){
          rows+='<Row>'+
            '<Cell><Data ss:Type="String">'+esc2(dateStr)+'</Data></Cell>'+
            '<Cell><Data ss:Type="String">'+esc2(sk)+'</Data></Cell>'+
            '<Cell><Data ss:Type="String">'+esc2(item.text)+'</Data></Cell>'+
            '<Cell><Data ss:Type="String">'+(item.checked?'✓':'')+'</Data></Cell>'+
          '</Row>\n';
        }
      });
    });
  });
  return rows;
}

function buildWeeklySheet(data){
  var rows='<Row>'+
    '<Cell ss:StyleID="hdr"><Data ss:Type="String">주차 시작일</Data></Cell>'+
    '<Cell ss:StyleID="hdr"><Data ss:Type="String">종류</Data></Cell>'+
    '<Cell ss:StyleID="hdr"><Data ss:Type="String">항목</Data></Cell>'+
    '<Cell ss:StyleID="hdr"><Data ss:Type="String">완료/상태</Data></Cell></Row>\n';
  var weeks=Object.keys(data.weekly).sort();
  weeks.forEach(function(wk){
    var w=data.weekly[wk];
    var ws=wk.replace('week-','');
    if(!w)return;
    (w.goals||[]).forEach(function(g){
      if(!g.text)return;
      rows+='<Row><Cell><Data ss:Type="String">'+esc2(ws)+'</Data></Cell>'+
        '<Cell><Data ss:Type="String">목표</Data></Cell>'+
        '<Cell><Data ss:Type="String">'+esc2(g.text)+'</Data></Cell>'+
        '<Cell><Data ss:Type="String">'+(g.completed?'완료':'')+'</Data></Cell></Row>\n';
    });
    var DAY_KS=['mon','tue','wed','thu','fri','sat','sun'];
    (w.tracker||[]).forEach(function(r){
      if(!r.habit&&!r.task)return;
      var days=DAY_KS.map(function(d){
        var v=r.days?r.days[d]:0;
        return v===1?'⭕':v===2?'❤️':v===3?'❌':'-';
      }).join(' ');
      rows+='<Row><Cell><Data ss:Type="String">'+esc2(ws)+'</Data></Cell>'+
        '<Cell><Data ss:Type="String">습관</Data></Cell>'+
        '<Cell><Data ss:Type="String">'+esc2(r.habit||r.task||'')+'</Data></Cell>'+
        '<Cell><Data ss:Type="String">'+esc2(days)+'</Data></Cell></Row>\n';
    });
    (w.missions||[]).forEach(function(m){
      if(!m.name)return;
      var done=(m.checks||[]).filter(Boolean).length;
      rows+='<Row><Cell><Data ss:Type="String">'+esc2(ws)+'</Data></Cell>'+
        '<Cell><Data ss:Type="String">미션</Data></Cell>'+
        '<Cell><Data ss:Type="String">'+esc2(m.name)+'</Data></Cell>'+
        '<Cell><Data ss:Type="String">'+done+'/'+(m.target||0)+'</Data></Cell></Row>\n';
    });
  });
  return rows;
}

function buildTemplatesSheet(data){
  var rows='<Row>'+
    '<Cell ss:StyleID="hdr"><Data ss:Type="String">템플릿명</Data></Cell>'+
    '<Cell ss:StyleID="hdr"><Data ss:Type="String">섹션</Data></Cell>'+
    '<Cell ss:StyleID="hdr"><Data ss:Type="String">항목</Data></Cell>'+
    '<Cell ss:StyleID="hdr"><Data ss:Type="String">타입</Data></Cell></Row>\n';
  (data.templates||[]).forEach(function(t){
    ['morning','afternoon','evening','night'].forEach(function(sk){
      (t.sections&&t.sections[sk]||[]).forEach(function(item){
        rows+='<Row><Cell><Data ss:Type="String">'+esc2(t.name)+'</Data></Cell>'+
          '<Cell><Data ss:Type="String">'+esc2(sk)+'</Data></Cell>'+
          '<Cell><Data ss:Type="String">'+esc2(item.text||'')+'</Data></Cell>'+
          '<Cell><Data ss:Type="String">'+esc2(item.type||'')+'</Data></Cell></Row>\n';
      });
    });
  });
  return rows;
}

function buildReflectionSheet(data){
  var rows='<Row>'+
    '<Cell ss:StyleID="hdr"><Data ss:Type="String">날짜</Data></Cell>'+
    '<Cell ss:StyleID="hdr"><Data ss:Type="String">오늘 잘한 일/감사한 일</Data></Cell>'+
    '<Cell ss:StyleID="hdr"><Data ss:Type="String">Lesson Learned</Data></Cell>'+
    '<Cell ss:StyleID="hdr"><Data ss:Type="String">내일 해낼 일</Data></Cell></Row>\n';
  var dates=Object.keys(data.daily).sort();
  dates.forEach(function(dk){
    var d=data.daily[dk];
    var dateStr=dk.replace('drt:','');
    if(!d||!d.reflection)return;
    var r=d.reflection;
    var goodStr=(r.good||[]).filter(function(v){return v&&v.trim();}).map(function(v,i){return (i+1)+'. '+v;}).join('\n');
    var lessonStr=(r.lesson||'').trim();
    var tmrStr=(r.tomorrow||[]).filter(function(v){return v&&v.trim();}).map(function(v,i){return (i+1)+'. '+v;}).join('\n');
    if(!goodStr&&!lessonStr&&!tmrStr)return;
    rows+='<Row>'+
      '<Cell><Data ss:Type="String">'+esc2(dateStr)+'</Data></Cell>'+
      '<Cell><Data ss:Type="String">'+esc2(goodStr)+'</Data></Cell>'+
      '<Cell><Data ss:Type="String">'+esc2(lessonStr)+'</Data></Cell>'+
      '<Cell><Data ss:Type="String">'+esc2(tmrStr)+'</Data></Cell>'+
    '</Row>\n';
  });
  return rows;
}

function makeWorksheet(name, rows){
  return '<Worksheet ss:Name="'+esc2(name)+'"><Table>'+rows+'</Table></Worksheet>';
}

function saveBackup(){
  var data=collectAllData();
  var json=JSON.stringify(data);
  var d=new Date();
  var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');

  var xmlHeader='<?xml version="1.0" encoding="UTF-8"?><?mso-application progid="Excel.Sheet"?>'+
  '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"'+
  ' xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"'+
  ' xmlns:o="urn:schemas-microsoft-com:office:office">'+
  '<Styles>'+
    '<Style ss:ID="hdr"><Font ss:Bold="1"/><Interior ss:Color="#D0C8FF" ss:Pattern="Solid"/></Style>'+
    '<Style ss:ID="hidden"><Font ss:Color="#FFFFFF"/><Interior ss:Color="#FFFFFF" ss:Pattern="Solid"/></Style>'+
  '</Styles>';

  var dailySheet=makeWorksheet('데일리 기록', buildDailySheet(data));
  var reflSheet=makeWorksheet('리플렉션 기록', buildReflectionSheet(data));
  var weeklySheet=makeWorksheet('위클리 기록', buildWeeklySheet(data));
  var tmplSheet=makeWorksheet('템플릿', buildTemplatesSheet(data));
  /* Hidden backup sheet — stores full JSON for restore */
  var backupSheet='<Worksheet ss:Name="_backup">'+
    '<Table>'+
    '<Row><Cell ss:StyleID="hidden"><Data ss:Type="String">'+esc2(json)+'</Data></Cell></Row>'+
    '</Table></Worksheet>';

  var xmlContent=xmlHeader+dailySheet+reflSheet+weeklySheet+tmplSheet+backupSheet+'</Workbook>';
  var blob=new Blob([xmlContent],{type:'application/vnd.ms-excel;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='my-routine-'+ds+'.xls';
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},300);
  showToast('저장됨: '+Object.keys(data.daily).length+'일치 + '+Object.keys(data.weekly).length+'주치');
}

function loadBackup(file){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var text=e.target.result;
      var data=null;
      /* Try Excel XML: look for _backup sheet JSON */
      var backupMatch=text.match(/ss:Name="_backup"[\s\S]*?<Data[^>]*>([^<]+)<\/Data>/);
      if(backupMatch){
        var jsonStr=backupMatch[1]
          .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
          .replace(/&quot;/g,'"').replace(/&#39;/g,"'");
        data=JSON.parse(jsonStr);
      } else {
        /* Try plain JSON */
        data=JSON.parse(text);
      }
      if(!data||(!data.daily&&!data.weekly&&!data.templates)){
        showToast('올바른 백업 파일이 아닙니다');return;
      }
      var dc=0,wc=0;
      if(data.daily){Object.keys(data.daily).forEach(function(k){localStorage.setItem(k,JSON.stringify(data.daily[k]));dc++;});}
      if(data.weekly){Object.keys(data.weekly).forEach(function(k){localStorage.setItem(k,JSON.stringify(data.weekly[k]));wc++;});}
      if(data.templates&&data.templates.length){localStorage.setItem('drt:templates',JSON.stringify(data.templates));}
      if(data.defaultTmplId){localStorage.setItem('drt:defaultTmplId',data.defaultTmplId);}
      showToast('복구 완료: '+dc+'일치 + '+wc+'주치');
      setTimeout(function(){render();},600);
    }catch(ex){
      showToast('파일 읽기 오류: '+ex.message);
    }
  };
  reader.readAsText(file,'UTF-8');
}

function bindCalendar(){
  document.getElementById('btn-prev-mo').onclick=function(){if(ST.calMonth===0){ST.calYear--;ST.calMonth=11;}else ST.calMonth--;render();};
  document.getElementById('btn-next-mo').onclick=function(){if(ST.calMonth===11){ST.calYear++;ST.calMonth=0;}else ST.calMonth++;render();};
  document.getElementById('btn-today').onclick=function(){openDay(todayStr());};
  var btnCalTmpl=document.getElementById('btn-cal-tmpl');
  if(btnCalTmpl) btnCalTmpl.onclick=function(){
    /* Open template panel from calendar — no dayData context needed */
    ST.tmplFromCalendar=true;
    openTmplPanel();
  };;
  document.querySelectorAll('.cal-day[data-date]').forEach(function(el){el.onclick=function(){openDay(this.dataset.date);};});
  document.querySelectorAll('[data-ws]').forEach(function(el){el.onclick=function(e){e.stopPropagation();openWeekModal(this.dataset.ws);};});
  /* Backup buttons */
  var btnBeta=document.getElementById('btn-beta-toggle');
  if(btnBeta){
    btnBeta.onclick=function(){
      var sec=document.getElementById('beta-section');
      var chev=document.getElementById('beta-chevron');
      var open=sec.style.display!=='none';
      sec.style.display=open?'none':'';
      if(chev)chev.textContent=open?'▼':'▲';
    };
  }
  var btnSave=document.getElementById('btn-backup-save');
  if(btnSave)btnSave.onclick=saveBackup;
  var btnLoad=document.getElementById('btn-backup-load');
  if(btnLoad){
    btnLoad.onclick=function(e){
      e.preventDefault();
      /* Remove and recreate input to reset any stale state */
      var oldInput=document.getElementById('backup-file-input');
      if(oldInput)oldInput.remove();
      var fi=document.createElement('input');
      fi.type='file';fi.id='backup-file-input';fi.accept='.xls,.json';
      fi.style.cssText='position:absolute;width:0;height:0;opacity:0;pointer-events:none;top:0;left:0';
      fi.addEventListener('change',function(){
        if(this.files&&this.files[0]){loadBackup(this.files[0]);}
        setTimeout(function(){if(fi.parentNode)fi.parentNode.removeChild(fi);},1000);
      });
      document.body.appendChild(fi);
      fi.click();
    };
  }
}

function renderSection(key,title,emoji,bg,items){
  var checks=items.filter(function(i){return i.type==='check';});
  var done=checks.filter(function(i){return i.checked;}).length;
  var pct=checks.length?Math.round(done/checks.length*100):0;
  var perf=pct===100&&checks.length>0;
  var pColor=perf?'#4cba7a':'#9080d8';
  var palette=SECT_TL_STOPS[key]||SECT_TL_STOPS.morning;
  var totalHd=items.filter(function(i){return i.type==='hd'||i.type==='timeline';}).length;
  var hdIdx=-1;
  /* Pre-init with first timeline color so items above first timeline inherit it */
  var firstDescClr=null;
  if(totalHd>0){
    var f0=lerpRgbaRaw(palette.bg[0],palette.bg[1],0);
    var f1=lerpRgbRaw(palette.bar[0],palette.bar[1],0);
    firstDescClr=mkDescClr(f0,f1);
  }
  var curTlDescClr=firstDescClr;
  var itemsH = '';
  var itemsH = '';
  var curDailyBlockId = null;
  var curDailyBlockBorder = null;
  items.forEach(function(item, idx){
    if(curDailyBlockId && item.type==='block') { itemsH+='</div></div>'; curDailyBlockId=null; curDailyBlockBorder=null; }

    /* block tracking handled in block render below */

    /* hd items */
    if(item.type==='hd'||item.type==='timeline'){
  
      hdIdx++;
      var ratio=totalHd<=1?0:hdIdx/(totalHd-1);
      var bgRaw=lerpRgbaRaw(palette.bg[0],palette.bg[1],ratio);
      var barRaw=lerpRgbRaw(palette.bar[0],palette.bar[1],ratio);
      var tlBg='rgba('+bgRaw[0]+','+bgRaw[1]+','+bgRaw[2]+','+bgRaw[3].toFixed(2)+')';
      curTlDescClr=mkDescClr(bgRaw,barRaw);
      var hdTimeLabel = (item.timeText||item.time) ? '<span style="font-size:12px;color:var(--lav-dk);font-weight:700;background:rgba(220,210,255,.4);padding:1px 6px;border-radius:5px;margin-right:6px;white-space:nowrap">'+(item.timeText||item.time)+'</span>' : '';

      return;
    }
    if(item.type==='desc'){
      itemsH+='<div class="check-row" style="padding-left:20px;font-size:13px;color:var(--text);display:flex;align-items:center;gap:9px"><div style="width:7px;height:7px;border-radius:50%;background:rgba(155,145,210,.55);flex-shrink:0"></div><span>'+item.text+'</span></div>';
      return;
    }
    if(item.type==='block'){
      /* Block in daily — full card: rounded rect bg, left accent line like screenshot */
      var dBlkBg = item.color || (SECT_TL_STOPS[key] ? (function(){var s=SECT_TL_STOPS[key];var r=lerpRgbaRaw(s.bg[0],s.bg[1],.35);return 'rgba('+r[0]+','+r[1]+','+r[2]+','+(r[3]||.35)+')';})() : 'rgba(220,210,255,.25)');
      var dBlkBorder = item.color ? darkenHex(item.color, 55) : (SECT_TL_STOPS[key] ? (function(){var s=SECT_TL_STOPS[key];var r=lerpRgbRaw(s.bar[0],s.bar[1],.4);return 'rgb('+r[0]+','+r[1]+','+r[2]+')';})() : '#9070c8');
      var dBlkText = item.color ? darkenHex(item.color, 95) : dBlkBorder;
      curDailyBlockId=item.id;
      curDailyBlockBorder=dBlkBorder;
      /* Outer card: rounded rect with background + left accent border */
      itemsH+='<div style="'+
        'margin:8px 12px 6px 12px;border-radius:14px;'+
        'background:'+dBlkBg+';'+
        'border-left:4px solid '+dBlkBorder+';'+
        'overflow:hidden">'+
        '<div style="display:flex;align-items:center;gap:6px;padding:8px 14px 6px 12px">'+
          '<span style="font-size:14px;font-weight:900;color:'+dBlkBorder+';letter-spacing:-1px;flex-shrink:0">&#8801;</span>'+
          '<span style="font-size:13px;font-weight:800;color:'+dBlkText+'">'+esc(item.text)+'</span>'+
        '</div>'+
        '<div style="padding:0 10px 8px 10px">';
      return;
    }
    if(item.blockId){
      /* Child of a block — rendered inside the card, same bg */
      if(item.type==='desc'||item.type==='sub'||item.type==='lbl'){
        var cDotC=curDailyBlockBorder||'rgba(155,145,210,.55)';
        itemsH+='<div style="display:flex;align-items:center;gap:8px;padding:2px 4px 2px 8px;font-size:13px;color:var(--text)">'+
          '<div style="width:6px;height:6px;border-radius:50%;background:'+cDotC+';flex-shrink:0;opacity:.7"></div>'+
          '<span>'+esc(item.text)+'</span></div>';
        return;
      }
      /* Check item */
      var cbCls2='cb'+(item.checked?' on':'');
      var txtCls2='cb-text'+(item.checked?' done':'');
      itemsH+='<button class="check-row" style="padding-left:4px;background:transparent" data-section="'+key+'" data-idx="'+idx+'">'+
        '<div class="'+cbCls2+'" aria-hidden="true">'+CHECK_SVG+'</div>'+
        '<span class="'+txtCls2+'">'+item.text+'</span></button>';
      if(item.memo&&item.memo.trim()) itemsH+='<div style="padding:1px 16px 4px 52px;font-size:11px;color:var(--muted);font-weight:500;line-height:1.4">'+esc(item.memo)+'</div>';
      return;
    }
    if(item.type==='sub'||item.type==='lbl'){
      itemsH+='<div class="check-row" style="padding-left:20px;font-size:13px;color:var(--text);display:flex;align-items:center;gap:9px"><div style="width:7px;height:7px;border-radius:50%;background:rgba(155,145,210,.55);flex-shrink:0"></div><span>'+item.text+'</span></div>';
      return;
    }
    if(item.type==='fever'){
      var ftext=item.text+(item.sub?'  <span style="font-size:11px;color:var(--muted);font-weight:500">'+item.sub+'</span>':'');
      itemsH+='<div class="check-row" style="padding-left:20px;font-size:13px;color:var(--text);display:flex;align-items:center;gap:9px"><div style="width:7px;height:7px;border-radius:50%;background:rgba(155,145,210,.55);flex-shrink:0"></div><span>'+ftext+'</span></div>';
      return;
    }
    var cbCls='cb'+(item.checked?' on':'');
    var txtCls='cb-text'+(item.checked?' done':'');
    itemsH+='<button class="check-row" data-section="'+key+'" data-idx="'+idx+'"><div class="'+cbCls+'" aria-hidden="true">'+CHECK_SVG+'</div><span class="'+txtCls+'">'+item.text+'</span></button>';
    if(item.memo&&item.memo.trim()){
      itemsH+='<div style="padding:2px 16px 5px 50px;font-size:11px;color:var(--muted);font-weight:500;line-height:1.4">'+esc(item.memo)+'</div>';
    }
  });

  /* Close any open block */
  if(curDailyBlockId){itemsH+='</div></div>';curDailyBlockId=null;curDailyBlockBorder=null;}
  return '<div class="sect-card" id="sect-'+key+'">'+
    '<div class="sect-hdr '+bg+'">'+
    '<div class="sect-hdr-left"><span style="font-size:18px">'+emoji+'</span><span class="sect-title">'+title+'</span>'+(perf?'<span style="font-size:14px">🎉</span>':'')+
    '</div><div class="sect-hdr-right"><span class="sect-count">'+done+'/'+checks.length+'</span>'+
    '<div class="sect-mini-bar"><div class="sect-mini-fill'+(perf?' done':'')+'" style="width:'+pct+'%;background:'+pColor+'"></div></div>'+
    '<span class="sect-pct'+(perf?' done':'')+'" style="color:'+pColor+'">'+pct+'%</span></div></div>'+
    '<div style="padding-bottom:4px">'+itemsH+'</div></div>';
}

function renderReflection(r){

  var tmrH = r.tomorrow.map(function(v,i){

  }).join('') +

    '<div class="refl-group"><div class="refl-label" style="color:#a855b5">'+esc(cfg.goodLabel)+'</div>'+goodH+'</div>'+

    '<div class="refl-group" style="margin-bottom:0"><div class="refl-label" style="color:#2a7a46">'+esc(cfg.tomorrowLabel)+'</div>'+tmrH+'</div>'+

  document.getElementById('btn-go-weekly').onclick=function(){

  };
  document.querySelectorAll('.refl-good').forEach(function(inp){inp.oninput=function(){ST.dayData.reflection.good[parseInt(this.dataset.idx)]=this.value;S.save(ST.currentDate,ST.dayData);};});
  var les=document.querySelector('.refl-lesson');if(les)les.oninput=function(){ST.dayData.reflection.lesson=this.value;S.save(ST.currentDate,ST.dayData);};
  document.querySelectorAll('.refl-tmr').forEach(function(inp){inp.oninput=function(){ST.dayData.reflection.tomorrow[parseInt(this.dataset.idx)]=this.value;S.save(ST.currentDate,ST.dayData);};});
  /* (+) add row for today only — extends array, doesn't touch template config */
  document.querySelectorAll('.refl-add-btn').forEach(function(btn){
    btn.onclick = function(){
      var type = this.dataset.type;
      if (type === 'good') {
        ST.dayData.reflection.good.push('');
      } else {
        ST.dayData.reflection.tomorrow.push('');
      }
      S.save(ST.currentDate, ST.dayData);
      /* Re-render only the reflection section */
      var old = document.getElementById('sect-reflection');
      if (old) {
        var tmp = document.createElement('div');
        tmp.innerHTML = renderReflection(ST.dayData.reflection);
        old.parentNode.replaceChild(tmp.firstChild, old);
        /* Re-bind */
        bindDay();
        bindDayTabs();
      }
    };
  });
  bindDayTabs();
}

function bindDayTabs(){
  var allTabs = document.querySelectorAll('.day-tab[data-sect]');
  var stickyHdr = document.querySelector('#pg-day .sticky-hdr');
  function scrollToSect(sect){
    var target = document.getElementById('sect-'+sect);
    if (!target) return;
    var hdrH = stickyHdr ? stickyHdr.offsetHeight : 0;
    var container = document.documentElement;
    var targetTop = target.getBoundingClientRect().top + window.pageYOffset - hdrH - 4;
    window.scrollTo({ top: targetTop, behavior: 'smooth' });
    allTabs.forEach(function(b){ b.classList.remove('active'); });
    var at = document.querySelector('.day-tab[data-sect="'+sect+'"]');
    if (at) at.classList.add('active');
  }
  allTabs.forEach(function(btn){
    btn.onclick = function(){ scrollToSect(this.dataset.sect); };
  });
  /* Scroll observer */
  if (typeof IntersectionObserver === 'undefined') return;
  var sects = ['morning','afternoon','evening','night','reflection'];
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if (entry.isIntersecting) {
        var id = entry.target.id.replace('sect-','');
        allTabs.forEach(function(b){ b.classList.remove('active'); });
        var activeTab = document.querySelector('.day-tab[data-sect="'+id+'"]');
        if (activeTab) activeTab.classList.add('active');
      }
    });
  }, {rootMargin:'-60px 0px -55% 0px', threshold:0});
  sects.forEach(function(sk){
    var el = document.getElementById('sect-'+sk);
    if (el) io.observe(el);
  });
  if (allTabs.length) allTabs[0].classList.add('active');
}
function bindDaySections(){
  document.querySelectorAll('.check-row[data-section]').forEach(function(btn){
    btn.onclick=function(){
      var sec=this.dataset.section,idx=parseInt(this.dataset.idx);

      if(fill){fill.style.width=prog+'%';fill.className='top-bar-fill'+(prog===100?' high':'');}
      var circleEl=document.getElementById('day-prog-circle-text');
      if(circleEl){circleEl.innerHTML=prog+'<span style="font-size:7px">%</span>';}
      var pEl=document.querySelector('#pg-day .sticky-hdr [style*="font-size:26px"]');
      if(pEl){pEl.innerHTML=prog+'<span style="font-size:13px">%</span>';pEl.style.color=pColor;}
      var s=SECTIONS.find(function(x){return x.key===sec;});
      var tmp=document.createElement('div');tmp.innerHTML=renderSection(s.key,s.title,s.emoji,s.bg,ST.dayData.routines[s.key]);
      var old=this.closest('.sect-card');old.parentNode.replaceChild(tmp.firstChild,old);
      bindDaySections();

        var ban=document.createElement('div');ban.className='complete-banner';ban.textContent='🎉 완벽해요! 오늘 모든 루틴을 완료했어요!';

      }

}

function buildTrackerHTML(tracker){
  return (tracker||[]).map(function(row,ri){
    var habitVal=row.habit||row.task||'';
    var overVal=row.over||row.condition||'';
    var achVal=row.achieve||row.success||'';
    var failVal=row.fail||'';
    var dH=DAY_KEYS.map(function(day){
      var v=normDay(row.days?row.days[day]:0);
      var cls='day-cyc'+(v===1?' s1':v===2?' s2':v===3?' s3':'');
      var icon=v===1?'⭕':v===2?'❤️':v===3?'❌':'-';
      return '<td class="td-day"><div class="'+cls+'" data-row="'+ri+'" data-day="'+day+'" data-val="'+v+'">'+icon+'</div></td>';
    }).join('');
    var daysDone=DAY_KEYS.filter(function(d){var v=normDay(row.days?row.days[d]:0);return v===1||v===2;}).length;
    var rowPct=daysDone/7;
    var rr=Math.round(255-(255-195)*rowPct),rg2=Math.round(255-(255-240)*rowPct),rb=Math.round(255-(255-215)*rowPct);
    var rowBg=daysDone>0?'rgba('+rr+','+rg2+','+rb+',.38)':'';
    var habitSetTag=!habitVal ? '<span class="tag" style="background:rgba(220,210,255,.4);color:#9070c8;border:1px solid rgba(180,170,220,.3);font-size:10px;padding:2px 5px;white-space:nowrap">설정 전</span>' : '';
    return '<tr style="background:'+rowBg+'">'+
      '<td class="td-habit" style="padding-left:8px;background:transparent;display:flex;align-items:center;gap:4px">'+habitSetTag+'<input type="text" class="tr-habit" data-row="'+ri+'" value="'+esc(habitVal)+'" placeholder="습관 이름…" style="font-weight:600;flex:1;min-width:0"></td>'+
      '<td class="td-cond"><input type="text" class="tr-over" data-row="'+ri+'" value="'+esc(overVal)+'" placeholder="목표초과"></td>'+
      '<td class="td-cond"><input type="text" class="tr-ach"  data-row="'+ri+'" value="'+esc(achVal)+'"  placeholder="목표달성"></td>'+
      '<td class="td-cond"><input type="text" class="tr-fail" data-row="'+ri+'" value="'+esc(failVal)+'" placeholder="실패"></td>'+
      dH+
      '<td style="text-align:center;padding:4px 2px;width:24px"><button class="btn-del tr-del" data-row="'+ri+'">&#215;</button></td>'+
    '</tr>';
  }).join('');
}

function renderMissionInner(missions){
  var html='';
  if(!missions||missions.length===0){
    html='<div class="miss-empty">미션을 추가해보세요 ✨</div>';
  } else {
    missions.forEach(function(m,mi){html+=renderMissionCard(m,mi);});
  }
  return html;
}

function renderMissionCard(m,mi){
  var done=0,target=m.target||0;
  (m.checks||[]).forEach(function(c){if(c)done++;});
  var pct=target?done/target:0;
  /* Background tint: white → rgba(180,240,200) green based on completion */
  var r=Math.round(255-(255-180)*pct), g2=Math.round(255-(255-240)*pct), b=Math.round(255-(255-200)*pct);
  var cardBg='rgba('+r+','+g2+','+b+',.45)';
  var badgeColor=done>=target&&target>0?'background:rgba(200,245,220,.8);color:#2a7a46;border:1px solid rgba(150,220,180,.6)':'background:rgba(220,210,255,.6);color:#6050b0;border:1px solid rgba(180,170,220,.4)';
  var badgeText=target?done+'/'+target:'설정 전';
  var checksH=target>0?renderMissionChecks(m,mi):'';
  return '<div class="mission-card" style="background:'+cardBg+'">'+
    '<div class="mission-hdr">'+
      '<span class="tag" style="'+badgeColor+';flex-shrink:0;font-size:11px;padding:3px 8px;margin-right:2px">'+badgeText+'</span>'+
      '<input type="text" class="inp miss-name" data-mi="'+mi+'" value="'+esc(m.name)+'" placeholder="미션 이름 &amp; 횟수 설정하면 시작!" style="flex:1;padding:6px 10px;font-size:13px;background:rgba(255,255,255,.6)">'+
      '<div class="cnt-ctrl">'+
        '<button class="cnt-btn" data-mi="'+mi+'" data-dir="-1">&#9664;</button>'+
        '<div class="cnt-val">'+target+'</div>'+
        '<button class="cnt-btn" data-mi="'+mi+'" data-dir="1">&#9654;</button>'+
      '</div>'+
      '<button class="btn-del miss-del" data-mi="'+mi+'" style="margin-left:4px">&#215;</button>'+
    '</div>'+
    (target>0?'<div class="mission-checks-wrap">'+checksH+'</div>':'<div style="padding:6px 14px 10px;font-size:12px;color:var(--muted)">&#9654; 버튼으로 횟수를 설정하세요</div>')+
  '</div>';
}

function renderMissionChecks(m,mi){
  var target=m.target||0;
  var checks=m.checks||[];
  while(checks.length<target)checks.push(false);
  /* 10 per row fixed */
  var rows=[], row=[];
  for(var i=0;i<target;i++){
    row.push(i);
    if(row.length===10||(i===target-1)){rows.push(row);row=[];}
  }
  var html='<div class="mc-grid">';
  rows.forEach(function(rowIdxs, ri){
    html+='<div class="mc-row">';
    rowIdxs.forEach(function(i, pos){
      /* Dashed vertical separator after position 4 (between 5th and 6th) */
      if(pos===5) html+='<div class="mc-vsep"></div>';
      var isDone=checks[i];
      html+='<div class="mc'+(isDone?' mc-on':'')+'" data-mi="'+mi+'" data-ci="'+i+'">'+(isDone?CHECK_SVG:'')+'</div>';
    });
    if(ri<rows.length-1) html+='</div><div class="mc-row-sep"></div>';
    else html+='</div>';
  });
  html+='</div>';
  return html;
}

function refreshMissionSection(){
  var sec=document.getElementById('mission-cards');
  if(sec){
    sec.innerHTML=renderMissionInner(ST.weekData.missions||[]);
    /* update badge */
    refreshMissionHeader();
    bindMissionEvents();
  }
}

function bindMissionEvents(){
  document.querySelectorAll('.miss-name').forEach(function(inp){
    inp.oninput=function(){var mi=parseInt(this.dataset.mi);ST.weekData.missions[mi].name=this.value;saveWeekAndSync();};
  });
  document.querySelectorAll('.cnt-btn').forEach(function(btn){
    btn.onclick=function(){
      var mi=parseInt(this.dataset.mi),dir=parseInt(this.dataset.dir);
      var m=ST.weekData.missions[mi];
      m.target=Math.max(0,Math.min(20,(m.target||0)+dir));
      while((m.checks||[]).length<m.target)m.checks.push(false);
      if(m.checks.length>m.target)m.checks=m.checks.slice(0,m.target);
      saveWeekAndSync();
      refreshMissionSection();
      bindMissionEvents();
    };
  });
  document.querySelectorAll('.mc').forEach(function(el){
    el.onclick=function(){
      var mi=parseInt(this.dataset.mi),ci=parseInt(this.dataset.ci);
      var m=ST.weekData.missions[mi];
      if(!m.checks)m.checks=[];
      while(m.checks.length<=ci)m.checks.push(false);
      m.checks[ci]=!m.checks[ci];
      this.classList.toggle('mc-on',m.checks[ci]);
      this.innerHTML=m.checks[ci]?CHECK_SVG:'';
      saveWeekAndSync();
      var done=m.checks.filter(Boolean).length,target=m.target||0;
      var pct=target?done/target:0;
      var card=this.closest('.mission-card');
      if(card){
        /* Update bg tint */
        var r=Math.round(255-(255-180)*pct), g2=Math.round(255-(255-240)*pct), b=Math.round(255-(255-200)*pct);
        card.style.background='rgba('+r+','+g2+','+b+',.45)';
        /* Update badge */
        var badge=card.querySelector('.tag');
        if(badge){
          badge.textContent=target?done+'/'+target:'설정 전';
          var isDone=done>=target&&target>0;
          badge.style.background=isDone?'rgba(200,245,220,.8)':'rgba(220,210,255,.6)';
          badge.style.color=isDone?'#2a7a46':'#6050b0';
          badge.style.border=isDone?'1px solid rgba(150,220,180,.6)':'1px solid rgba(180,170,220,.4)';
        }
      }
      refreshMissionHeader();
    };
  });
  document.querySelectorAll('.miss-del').forEach(function(btn){
    btn.onclick=function(){ST.weekData.missions.splice(parseInt(this.dataset.mi),1);saveWeekAndSync();refreshMissionSection();bindMissionEvents();};
  });
  var addBtn=document.getElementById('btn-add-mission');
  if(addBtn)addBtn.onclick=function(){if(!ST.weekData.missions)ST.weekData.missions=[];ST.weekData.missions.push(mkMission());saveWeekAndSync();refreshMissionSection();bindMissionEvents();};
}

function refreshMissionHeader(){
  /* 설정된 미션만 카운트: 이름 또는 횟수가 설정된 것 */
  var configured=(ST.weekData.missions||[]).filter(function(m){
    return (m.name&&m.name.trim())&&(m.target&&m.target>0);
  });
  var done=configured.filter(function(m){
    var tgt=m.target||0;
    if(!tgt) return false;
    return (m.checks||[]).filter(Boolean).length>=tgt;
  }).length;
  var badgeText=configured.length ? done+'/'+configured.length+' 완료' : '0/0 완료';
  /* Find badge specifically within mission section to avoid index issues */
  var missSection=document.getElementById('wk-sect-mission');
  if(missSection){
    var badge=missSection.querySelector('.wk-done-badge');
    if(badge) badge.textContent=badgeText;
  } else {
    /* fallback: use index */
    var allBadges=document.querySelectorAll('.wk-done-badge');
    if(allBadges[2]) allBadges[2].textContent=badgeText;
  }
}

function bindTrackerEvents(){
  document.querySelectorAll('.tr-habit').forEach(function(inp){inp.oninput=function(){
    var ri=parseInt(this.dataset.row);
    ST.weekData.tracker[ri].habit=this.value;
    saveWeekAndSync();
    /* 설정전 태그 토글 */
    var td=this.closest('td');
    if(td){var tag=td.querySelector('.tag');if(tag){if(this.value.trim())tag.style.display='none';else tag.style.display='';}}
  };});
  document.querySelectorAll('.tr-over').forEach(function(inp){inp.oninput=function(){var ri=parseInt(this.dataset.row);ST.weekData.tracker[ri].over=this.value;saveWeekAndSync();};});
  document.querySelectorAll('.tr-ach').forEach(function(inp){inp.oninput=function(){var ri=parseInt(this.dataset.row);ST.weekData.tracker[ri].achieve=this.value;saveWeekAndSync();};});
  document.querySelectorAll('.tr-fail').forEach(function(inp){inp.oninput=function(){var ri=parseInt(this.dataset.row);ST.weekData.tracker[ri].fail=this.value;saveWeekAndSync();};});

  /* 3-state day cycling: 0→1(⭕)→2(❤️)→0 */
  document.querySelectorAll('.day-cyc').forEach(function(el){
    el.onclick=function(){
      var ri=parseInt(this.dataset.row),day=this.dataset.day;
      var cur=normDay(this.dataset.val),nxt=(cur+1)%4;
      ST.weekData.tracker[ri].days[day]=nxt;
      this.dataset.val=nxt;
      this.className='day-cyc'+(nxt===1?' s1':nxt===2?' s2':nxt===3?' s3':'');
      this.textContent=nxt===1?'⭕':nxt===2?'❤️':nxt===3?'❌':'-';
      saveWeekAndSync();
      updateModalProgress();
      /* Update row bg */
      var tr=this.closest('tr');
      if(tr){
        var done=DAY_KEYS.filter(function(d){var dv=normDay(ST.weekData.tracker[ri].days?ST.weekData.tracker[ri].days[d]:0);return dv===1||dv===2;}).length;
        var rp=done/7;
        var rr2=Math.round(255-(255-195)*rp),rg3=Math.round(255-(255-240)*rp),rb2=Math.round(255-(255-215)*rp);
        tr.style.background=done>0?'rgba('+rr2+','+rg3+','+rb2+',.38)':'';
      }
    };
  });

  document.querySelectorAll('.tr-del').forEach(function(btn){
    btn.onclick=function(){ST.weekData.tracker.splice(parseInt(this.dataset.row),1);saveWeekAndSync();refreshTrackerTable();bindTrackerEvents();};
  });
}

  if(tbody)tbody.innerHTML=buildTrackerHTML(ST.weekData.tracker);
}

    btn.onclick=function(){
      var sect=this.dataset.wksect;

      document.querySelectorAll('.day-tab[data-wksect]').forEach(function(b){b.classList.remove('active');});

      var curDone=gcfg4.filter(function(x){return x.completed;}).length;
      if(allB[0])allB[0].textContent=gcfg4.length?curDone+'/'+gcfg4.length+' 완료':'0/0 완료';
      card.querySelector('.goal-inp[data-idx="'+n+'"]').focus();
    }
  };

  /* Tracker */
  bindTrackerEvents();
  var addRowBtn=document.getElementById('btn-add-row');
  if(addRowBtn) addRowBtn.onclick=function(){ST.weekData.tracker.push(mkHabitRow());saveWeekAndSync();refreshTrackerTable();bindTrackerEvents();};

  if(addMissBtn) addMissBtn.onclick=function(){
    if(!ST.weekData.missions)ST.weekData.missions=[];

function updateModalProgress(){
  var prog=weekProg(ST.weekData),pColor=prog===100?'#4cba7a':prog>60?'#9080d8':'#3b9fd6';
  var fill=document.querySelector('.wk-prog-fill');
  if(fill){fill.style.width=prog+'%';fill.className='wk-prog-fill'+(prog===100?' done':'');}
  var wCircleEl=document.getElementById('wk-prog-circle-text');
  if(wCircleEl){wCircleEl.innerHTML=prog+'<span style="font-size:7px">%</span>';}
  var pEl=document.querySelector('#pg-weekly [style*="font-size:22px"]');
  if(pEl){pEl.innerHTML=prog+'<span style="font-size:12px">%</span>';pEl.style.color=pColor;}
  /* update wk-done-badges: 0=goals, 1=habits, 2=missions */
  var badges=document.querySelectorAll('.wk-done-badge');
  if(badges[0]){
    var gcfg=ST.weekData.goals.filter(function(g){return g.text&&g.text.trim();});
    var gd=gcfg.filter(function(g){return g.completed;}).length;
    badges[0].textContent=gcfg.length ? gd+'/'+gcfg.length+' 완료' : '0/0 완료';
  }
  if(badges[1]){
    var hcfg=(ST.weekData.tracker||[]).filter(function(r){return r.habit&&r.habit.trim();});
    var hd=hcfg.filter(function(r){
      return DAY_KEYS.every(function(d){var v=normDay(r.days?r.days[d]:0);return v===1||v===2;});
    }).length;
    badges[1].textContent=hcfg.length?hd+'/'+hcfg.length+' 완료':'0/0 완료';
  }
  if(badges[2]){
    var mcfg=(ST.weekData.missions||[]).filter(function(m){return (m.name&&m.name.trim())&&(m.target&&m.target>0);});
    var mdc=mcfg.filter(function(m){var tgt=m.target||0;if(!tgt)return false;return (m.checks||[]).filter(Boolean).length>=tgt;}).length;
    badges[2].textContent=mcfg.length?mdc+'/'+mcfg.length+' 완료':'0/0 완료';
  }
}

var TMPL_KEY='drt:templates';


/* ── Default template system ── */
var DEFAULT_TMPL_KEY = 'drt:defaultTmplId';
function getDefaultTmplId(){
  try{ return localStorage.getItem(DEFAULT_TMPL_KEY)||'tpl_default'; }catch(e){return 'tpl_default';}
}
function setDefaultTmplId(id){
  try{ localStorage.setItem(DEFAULT_TMPL_KEY, id); }catch(e){}
  /* Apply to all saved days that have no real user interaction */
  try{
    var tmpl = id === 'tpl_default' ? null : getTmplById(id);
    var keys = [];
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k&&k.match(/^drt:\d{4}-\d{2}-\d{2}$/)) keys.push(k);
    }
    keys.forEach(function(k){
      var ds=k.replace('drt:','');
      if(!S.hasReal(ds)){
        /* No real data — rewrite routines with new template */
        var day=S.load(ds);
        if(!day) return;
        var src = tmpl ? tmpl : null;
        SECTIONS.forEach(function(s){
          var items = src ? (src.sections[s.key]||[]) : (ROUTINE_TEMPLATE[s.key]||[]);
          day.routines[s.key]=items.map(function(item){
            var copy=Object.assign({},item);
            if(copy.type==='check') copy.checked=false;
            return copy;
          });
        });
        S.save(ds, day);
      }
    });
  }catch(e){}
}

function mkDefaultTemplate(){
  var sections={};
  Object.keys(ROUTINE_TEMPLATE).forEach(function(k){
    sections[k]=ROUTINE_TEMPLATE[k].map(function(item){return Object.assign({},item);});
  });
  return {id:'tpl_default',name:'예시 템플릿',createdAt:todayStr(),sections:sections};
}

function getTmpls(){
  try{
    var r=localStorage.getItem(TMPL_KEY);
    var arr=r?JSON.parse(r):[];
    var hasDef=arr.find(function(t){return t.id==='tpl_default';});
    if(!hasDef){arr.unshift(mkDefaultTemplate());localStorage.setItem(TMPL_KEY,JSON.stringify(arr));}
    return arr;
  }catch(e){return [mkDefaultTemplate()];}
}

function saveTmpls(arr){
  try{localStorage.setItem(TMPL_KEY,JSON.stringify(arr));}catch(e){}
}

function getTmplById(id){
  return getTmpls().find(function(t){return t.id===id;})||null;
}

function countTmplItems(tmpl){
  var n=0;
  Object.keys(tmpl.sections||{}).forEach(function(k){
    (tmpl.sections[k]||[]).forEach(function(item){if(item.type==='check')n++;});
  });
  return n;
}

function applyTmplToDay(tmplId){
  var tmpl=getTmplById(tmplId);
  if(!tmpl)return;
  var newRoutines={};
  Object.keys(tmpl.sections).forEach(function(k){
    newRoutines[k]=(tmpl.sections[k]||[]).map(function(item){
      var copy = Object.assign({},item);
      if(copy.type==='check') copy.checked = false;
      return copy;
    });
  });
  ST.dayData.routines=newRoutines;
  ST.dayData.appliedTemplate=tmplId;
  S.save(ST.currentDate,ST.dayData);
}

/* ── Save or update template ── */
function saveTmpl(tmpl){
  var arr=getTmpls();
  var idx=arr.findIndex(function(t){return t.id===tmpl.id;});
  if(idx>=0)arr[idx]=tmpl;
  else arr.push(tmpl);
  saveTmpls(arr);
}

function deleteTmpl(tmplId){
  var arr=getTmpls().filter(function(t){return t.id!==tmplId;});
  saveTmpls(arr);
}

function confirmAndApplyTemplate(tid, onConfirmed) {
  /* Skip confirm if: from calendar, same template already applied, or no real user data today */
  var isSame = ST.dayData && ST.dayData.appliedTemplate === tid;
  var hasData = ST.dayData && S.hasReal(ST.currentDate);
  var fromCal = ST.tmplFromCalendar;

  if (fromCal || isSame || !hasData) {
    onConfirmed();
    return;
  }

  /* Show warning only when user has real data and is switching to a different template */
  var old = document.getElementById('tmpl-confirm-popup');
  if (old) old.remove();
  var pop = document.createElement('div');
  pop.id = 'tmpl-confirm-popup';
  pop.style.cssText = 'position:fixed;z-index:9999;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35)';
  pop.innerHTML = '<div style="background:#fff;border-radius:18px;padding:22px 20px;max-width:300px;width:90%;box-shadow:0 8px 32px rgba(80,60,160,.22)">' +
    '<div style="font-size:15px;font-weight:800;color:#2a1f5a;margin-bottom:10px">템플릿 변경 확인</div>' +
    '<div style="font-size:13px;color:#555;line-height:1.6;margin-bottom:18px">⚠️ 템플릿을 변경하면 오늘 날짜부터 기록된 내용이 초기화됩니다.<br><span style="font-size:11px;color:#888">(어제까지의 기록만 유지됩니다.)</span><br><br>그래도 변경하시겠습니까?</div>' +
    '<div style="display:flex;gap:10px">' +
      '<button id="tmpl-confirm-yes" style="flex:1;padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,rgba(139,127,212,.9),rgba(59,159,214,.8));color:#fff;font-size:14px;font-weight:800;cursor:pointer">변경</button>' +
      '<button id="tmpl-confirm-no" style="flex:1;padding:10px;border-radius:10px;border:1.5px solid rgba(180,170,220,.4);background:transparent;color:#8878b8;font-size:14px;font-weight:700;cursor:pointer">취소</button>' +
    '</div>' +
  '</div>';
  document.body.appendChild(pop);
  document.getElementById('tmpl-confirm-yes').onclick = function(){ pop.remove(); onConfirmed(); };
  document.getElementById('tmpl-confirm-no').onclick = function(){ pop.remove(); };
  pop.onclick = function(e){ if(e.target===pop) pop.remove(); };
}

function bindTmplPanel(){
  document.getElementById('btn-close-tpanel').onclick=closeTmplPanel;

  document.querySelectorAll('.btn-apply').forEach(function(btn){
    btn.onclick=function(){
      var tid=this.dataset.tid;
      var capturedTid=tid;
      confirmAndApplyTemplate(capturedTid, function(){
        applyTmplToDay(capturedTid);
        /* Update ✓ 적용중 badge — find card by tid, not by btn reference */
        var panel=document.getElementById('tpanel-el');
        if(panel){
          panel.querySelectorAll('.tmpl-cur-badge').forEach(function(b){b.remove();});
          var applyBtn=panel.querySelector('.btn-apply[data-tid="'+capturedTid+'"]');
          var thisCard=applyBtn ? applyBtn.closest('.tmpl-card') : null;
          if(thisCard){
            var nameRow=thisCard.querySelector('.tmpl-card-name');
            if(nameRow){
              var cb=document.createElement('span');
              cb.className='tmpl-cur-badge';
              cb.style.cssText='font-size:10px;background:rgba(75,186,122,.18);color:#2a7a46;padding:2px 7px;border-radius:8px;font-weight:700';
              cb.textContent='✓ 적용중';
              nameRow.insertAdjacentElement('afterend',cb);
            }
          }
        }
        /* Re-render day behind panel */
        var dayEl=document.querySelector('#pg-day');
        if(dayEl){
          var tmp=document.createElement('div');
          tmp.innerHTML=renderDay();
          dayEl.replaceWith(tmp.firstChild);
          bindDay();
          bindDaySections();
        }
      });
    };
  });

  document.querySelectorAll('.btn-te-del-tmpl').forEach(function(btn){
    btn.onclick=function(){
      var tid=this.dataset.tid;
      if(confirm('템플릿을 삭제할까요?')){
        deleteTmpl(tid);
        /* if currently applied template was deleted, clear it */
        if(ST.dayData&&ST.dayData.appliedTemplate===tid){
          ST.dayData.appliedTemplate='';
          S.save(ST.currentDate,ST.dayData);
        }
        closeTmplPanel();
        setTimeout(openTmplPanel,320);

  document.querySelectorAll('.btn-edit-tmpl').forEach(function(btn){
    btn.onclick=function(){
      var tid=this.dataset.tid;

      ST.tmplEditData=JSON.parse(JSON.stringify(tmpl));
      ST.tmplEditOriginal=JSON.stringify(tmpl);
      openTmplEditor(true);
    };
  });

  document.querySelectorAll('.btn-set-default').forEach(function(btn){
    btn.onclick=function(){
      var tid=this.dataset.tid;
      var tmpl=getTmplById(tid);
      if(!tmpl)return;
      var tid2 = tid; /* capture */
      confirmAndApplyTemplate(tid, function(){
        setDefaultTmplId(tid2);
        var didApply = !!ST.dayData;
        if(didApply){ applyTmplToDay(tid2); }
        showToast('[' + tmpl.name + '] 기본 템플릿으로 설정되었습니다');
        /* Re-render day behind panel */
        var dayEl=document.querySelector('#pg-day');
        if(dayEl){
          var tmp=document.createElement('div');tmp.innerHTML=renderDay();
          dayEl.replaceWith(tmp.firstChild);bindDay();bindDaySections();
        }
        /* Update ALL cards in the panel without closing */
        var panel = document.getElementById('tpanel-el');
        if (!panel) return;
        var defBtn2 = panel.querySelector('.btn-set-default[data-tid="'+tid2+'"]');
        var newDefCard = defBtn2 ? defBtn2.closest('.tmpl-card') : null;
        /* Move 적용중 badge if we also applied to current day */
        if (didApply) {
          panel.querySelectorAll('.tmpl-cur-badge').forEach(function(b){ b.remove(); });
          if (newDefCard) {
            var nameElC = newDefCard.querySelector('.tmpl-card-name');
            if (nameElC) {
              var cbN = document.createElement('span');
              cbN.className = 'tmpl-cur-badge';
              cbN.style.cssText = 'font-size:10px;background:rgba(75,186,122,.18);color:#2a7a46;padding:2px 7px;border-radius:8px;font-weight:700';
              cbN.textContent = '✓ 적용중';
              nameElC.insertAdjacentElement('afterend', cbN);
            }
          }
        }
        panel.querySelectorAll('.tmpl-card').forEach(function(card){
        var isNewDef = (card === newDefCard);
        /* Badge */
        var badgeEl = card.querySelector('.tmpl-def-badge');
        if (isNewDef && !badgeEl) {
          var nameEl = card.querySelector('.tmpl-card-name');
          if (nameEl) {
            var b = document.createElement('span');
            b.className = 'tmpl-def-badge';
            b.style.cssText = 'font-size:10px;background:linear-gradient(135deg,#8b7fd4,#3b9fd6);color:#fff;padding:2px 7px;border-radius:8px;font-weight:700';
            b.textContent = '★ 기본';
            nameEl.insertAdjacentElement('afterend', b);
          }
        } else if (!isNewDef && badgeEl) {
          badgeEl.remove();
        }
        /* def-tmpl class */
        card.classList.toggle('def-tmpl', isNewDef);
        /* Button */
        var defBtn = card.querySelector('.btn-set-default');
        if (!defBtn) return;
        if (isNewDef) {
          defBtn.textContent = '✓ 기본 설정됨';
          defBtn.disabled = true;
          defBtn.style.cssText = defBtn.style.cssText
            .replace('color:var(--lav-dk)', 'color:var(--muted)')
            .replace('background:rgba(139,127,212,.1)', 'background:rgba(180,180,180,.1)')
            .replace('border:1.5px solid rgba(139,127,212,.3)', 'border:1.5px solid rgba(180,180,180,.25)');
        } else {
          defBtn.textContent = '⭐ 기본으로 설정';
          defBtn.disabled = false;
          defBtn.style.cssText = defBtn.style.cssText
            .replace('color:var(--muted)', 'color:var(--lav-dk)')
            .replace('background:rgba(180,180,180,.1)', 'background:rgba(139,127,212,.1)')
            .replace('border:1.5px solid rgba(180,180,180,.25)', 'border:1.5px solid rgba(139,127,212,.3)');
        }
      });
      });
    };
  });

  document.getElementById('btn-new-tmpl').onclick=function(){
    var blank={id:'tpl_'+Date.now(),name:'새 템플릿',createdAt:todayStr(),sections:{}};
    SECTIONS.forEach(function(s){blank.sections[s.key]=[];});
    ST.tmplEditData=blank;
    ST.tmplEditOriginal=JSON.stringify(blank);
    openTmplEditor(false);
  };
}

function pushTmplHistory() {
  /* Trim any redo future */
  ST.tmplHistory = ST.tmplHistory.slice(0, ST.tmplHistIdx + 1);
  ST.tmplHistory.push(JSON.stringify(ST.tmplEditData));
  ST.tmplHistIdx = ST.tmplHistory.length - 1;
  /* Cap at 60 snapshots */
  if (ST.tmplHistory.length > 60) {
    ST.tmplHistory = ST.tmplHistory.slice(ST.tmplHistory.length - 60);
    ST.tmplHistIdx = ST.tmplHistory.length - 1;
  }
  updateHistoryBtns();
}

function pushHistDebounced() {
  clearTimeout(_histDebounce);
  _histDebounce = setTimeout(pushTmplHistory, 600);
}

function undoTmpl() {
  if (ST.tmplHistIdx <= 0) return;
  ST.tmplHistIdx--;
  ST.tmplEditData = JSON.parse(ST.tmplHistory[ST.tmplHistIdx]);
  ST.tmplActiveItem = null;
  refreshTmplEditor();
  updateHistoryBtns();
}

function redoTmpl() {
  if (ST.tmplHistIdx >= ST.tmplHistory.length - 1) return;
  ST.tmplHistIdx++;
  ST.tmplEditData = JSON.parse(ST.tmplHistory[ST.tmplHistIdx]);
  ST.tmplActiveItem = null;
  refreshTmplEditor();
  updateHistoryBtns();
}

function updateHistoryBtns() {
  var u = document.getElementById('btn-te-undo');
  var r = document.getElementById('btn-te-redo');
  if (u) u.disabled = ST.tmplHistIdx <= 0;
  if (r) r.disabled = ST.tmplHistIdx >= ST.tmplHistory.length - 1;
}

function openTmplEditor(isEdit){
  ST.tmplEdit=true;
  /* Reset history */
  ST.tmplHistory=[];
  ST.tmplHistIdx=-1;
  pushTmplHistory();
  var app=document.getElementById('app');
  var existing=document.getElementById('tedit-el');
  if(existing)existing.remove();
  app.insertAdjacentHTML('beforeend',renderTmplEditor());
  requestAnimationFrame(function(){
    var el=document.getElementById('tedit-el');
    if(el)el.classList.add('open');
  });
  bindTmplEditor();
}

function closeTmplEditor(){
  var el=document.getElementById('tedit-el');
  if(el){el.classList.remove('open');setTimeout(function(){el.remove();},310);}
  ST.tmplEdit=false;
  ST.tmplLoadPopup=false;
}

   TEMPLATE EDITOR PANEL (RENDER + DRAG)
══════════════════════════════════ */
/* Per-section gradient stops: [start_rgba, end_rgba] for bg; [start_rgb, end_rgb] for bar */
var SECT_TL_STOPS = {
  morning:   { bg:[[200,238,200,.65],[255,238,150,.65]], bar:[[90,185,90],[210,175,40]] },
  afternoon: { bg:[[255,245,185,.65],[255,195,120,.65]], bar:[[210,180,40],[218,105,38]] },
  evening:   { bg:[[195,222,255,.65],[238,190,252,.65]], bar:[[95,155,225],[185,95,225]] },
  night:     { bg:[[222,208,255,.65],[178,165,240,.65]], bar:[[148,118,210],[95,70,175]] },
};

var TBLOCK_PRESETS = ['#ffd6d6','#ffe8cc','#fffacc','#d6f5d6','#cce8ff','#e8ccff','#ffd6f0','#d6f0f5','#dde8ff','#ffeedd'];

var DRAG_SVG = '<svg width="10" height="10" viewBox="0 0 10 10" fill="none" style="pointer-events:none"><circle cx="3" cy="3" r="1.3" fill="currentColor"/><circle cx="7" cy="3" r="1.3" fill="currentColor"/><circle cx="3" cy="7" r="1.3" fill="currentColor"/><circle cx="7" cy="7" r="1.3" fill="currentColor"/></svg>';
/* _dragged removed — threshold-based detection in startDrag/onDragEnd */

function normItemType(item) {
  if (item.type === 'hd') return 'timeline';
  return item.type;
}

function lerpRgba(s, e, t) {
  return 'rgba('+Math.round(s[0]+(e[0]-s[0])*t)+','+Math.round(s[1]+(e[1]-s[1])*t)+','+Math.round(s[2]+(e[2]-s[2])*t)+','+(s[3]+(e[3]-s[3])*t).toFixed(2)+')';
}
function lerpRgb(s, e, t) {
  return 'rgb('+Math.round(s[0]+(e[0]-s[0])*t)+','+Math.round(s[1]+(e[1]-s[1])*t)+','+Math.round(s[2]+(e[2]-s[2])*t)+')';
}
/* Raw variants that return arrays for further arithmetic */
function lerpRgbaRaw(s, e, t) {
  return [Math.round(s[0]+(e[0]-s[0])*t), Math.round(s[1]+(e[1]-s[1])*t), Math.round(s[2]+(e[2]-s[2])*t), s[3]+(e[3]-s[3])*t];
}
function lerpRgbRaw(s, e, t) {
  return [Math.round(s[0]+(e[0]-s[0])*t), Math.round(s[1]+(e[1]-s[1])*t), Math.round(s[2]+(e[2]-s[2])*t)];
}
/* Darken a hex color by `amt` per channel — same hue, darker */
function darkenHex(hex, amt) {
  var h=(hex||'#cce8ff').replace('#','');
  if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  var r=Math.max(0,parseInt(h.slice(0,2),16)-amt);
  var g=Math.max(0,parseInt(h.slice(2,4),16)-amt);
  var b=Math.max(0,parseInt(h.slice(4,6),16)-amt);
  return 'rgb('+r+','+g+','+b+')';
}
function mkDescClr(bgRaw, barRaw) {
  /* bg: shift toward white (add ~22), halve opacity */
  var dr=Math.min(255,bgRaw[0]+22), dg=Math.min(255,bgRaw[1]+22), db=Math.min(255,bgRaw[2]+22);
  var da=(bgRaw[3]*0.52).toFixed(2);
  /* border: bar color at low opacity */
  var bdr='rgba('+barRaw[0]+','+barRaw[1]+','+barRaw[2]+',.42)';
  /* font: bar color darkened by ~40 */
  var fr=Math.max(0,barRaw[0]-40), fg=Math.max(0,barRaw[1]-40), fb=Math.max(0,barRaw[2]-40);
  return { bg:'rgba('+dr+','+dg+','+db+','+da+')', border:bdr, font:'rgb('+fr+','+fg+','+fb+')' };
}

/* DESIGN A: gradient-interpolated colors per item (bg/bar/desc). Used by timeline items only. */
function teGetColors(items, sk) {
  var stops = SECT_TL_STOPS[sk] || SECT_TL_STOPS.morning;
  var totalTl = 0;
  for (var j = 0; j < items.length; j++) {
    if (normItemType(items[j]) === 'timeline') totalTl++;
  }
  var result = [], tlIdx = -1, curBg = null, curBar = null, curDesc = null;
  /* Pre-init curDesc with first timeline color so pre-timeline items inherit it */
  if (totalTl > 0) {
    var fb = lerpRgbaRaw(stops.bg[0], stops.bg[1], 0);
    var fr = lerpRgbRaw(stops.bar[0], stops.bar[1], 0);
    curDesc = mkDescClr(fb, fr);
  }
  for (var i = 0; i < items.length; i++) {
    if (normItemType(items[i]) === 'timeline') {
      tlIdx++;
      var ratio = totalTl <= 1 ? 0 : tlIdx / (totalTl - 1);
      var bgRaw  = lerpRgbaRaw(stops.bg[0],  stops.bg[1],  ratio);
      var barRaw = lerpRgbRaw(stops.bar[0], stops.bar[1], ratio);
      curBg   = 'rgba('+bgRaw[0]+','+bgRaw[1]+','+bgRaw[2]+','+bgRaw[3].toFixed(2)+')';
      curBar  = 'rgb('+barRaw[0]+','+barRaw[1]+','+barRaw[2]+')';
      curDesc = mkDescClr(bgRaw, barRaw);
    } else if (items[i].type === 'timeblock') {
      curBg = null; curBar = null;
    } else if (items[i].type === 'timeblock') {
      /* timeblock has own color — break timeline group coloring */
      curBg = null; curBar = null;
    }
    result.push({ bg: curBg, bar: curBar, desc: curDesc });
  }
  return result;
}
