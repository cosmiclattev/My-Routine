function renderInlineAdd(items, afterIdx, sk) {
  var afterItem = items[afterIdx] || {};

var _drag = null;
var _dragJustEnded = false; /* suppress click after drag */
var DRAG_THRESH = 7; /* px — below this = click, above = drag */

function initEditorDnD() {
  document.querySelectorAll('.te-drag-handle').forEach(function(handle){
    var sk = handle.dataset.sk;
    handle.addEventListener('mousedown',  function(e){ startDrag(e, sk, handle, false); }, {passive:false});
    handle.addEventListener('touchstart', function(e){ startDrag(e, sk, handle, true);  }, {passive:false});
  });
}

function startDrag(e, sk, handle, isTouch) {
  var itemEl = handle.closest('.te-item');
  if (!itemEl) return;
  var idx = parseInt(itemEl.dataset.ii);
  var listEl = itemEl.closest('.te-items-list');
  if (!listEl) return;
  var clientY = isTouch ? e.touches[0].clientY : e.clientY;
  /* Kill all edit state immediately — nothing should activate during drag */
  deactivateAllItems();
  listEl.setAttribute('data-te-dragging', '1');  /* CSS blocks inline-add */
  _drag = { sk:sk, idx:idx, el:itemEl, listEl:listEl,
            curOverIdx:-1, curStateKey:'', dropIntoBlockIdx:-1,
            started:false, startY:clientY };
  if (isTouch) {
    document.addEventListener('touchmove', onDragMove, {passive:false});
    document.addEventListener('touchend',  onDragEnd,  {passive:true});
    e.preventDefault();
  } else {
    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('mouseup',   onDragEnd);
  }
}

function onDragMove(e) {
  if (!_drag) return;
  var clientY = e.touches ? e.touches[0].clientY : e.clientY;
  var dy = Math.abs(clientY - _drag.startY);
  if (!_drag.started) {
    if (dy < DRAG_THRESH) return;
    _drag.started = true;
    _drag.el.classList.add('te-dragging');
    var bw0 = _drag.el.closest('.te-block-wrap');
    if (bw0) bw0.classList.add('te-block-dragging');
  }
  if (e.preventDefault) e.preventDefault();

  var domItems = _drag.listEl.querySelectorAll('.te-item');
  var dataItems = (ST.tmplEditData.sections[_drag.sk]) || [];

  /* Standard midpoint: insertBeforeIdx = index of item we'd insert before */
  var ins = domItems.length;
  for (var j=0; j<domItems.length; j++) {
    if (clientY < domItems[j].getBoundingClientRect().top + domItems[j].getBoundingClientRect().height/2) { ins=j; break; }
  }

  /* Adjacent data items */
  var pdi = ins-1, ndi = ins;
  var pItem = pdi>=0 ? dataItems[parseInt(domItems[pdi].dataset.ii)] : null;
  var nItem = ndi<domItems.length ? dataItems[parseInt(domItems[ndi].dataset.ii)] : null;

  /* ── Determine inside/outside block ────────────────────────────────
     Use data indices for clear cases, bounding rect ONLY for the
     ambiguous boundary (after last child / empty block).           */
  var inside = false, blkId = null;

  if (nItem && nItem.blockId) {
    /* Before a block child → inside */
    inside=true; blkId=nItem.blockId;

  } else if (pItem && pItem.type==='block' && nItem && nItem.blockId===pItem.id) {
    /* After block header, before first child → inside */
    inside=true; blkId=pItem.id;

  } else if (pItem && pItem.blockId && nItem && nItem.blockId===pItem.blockId) {
    /* Between two children → inside */
    inside=true; blkId=pItem.blockId;

  } else if (pItem && (pItem.type==='block' || pItem.blockId)) {
    /* After block header (empty) or after last child → use bwRect */
    var bwChk = pdi>=0 ? domItems[pdi].closest('.te-block-wrap') : null;
    if (bwChk) {
      var bwR = bwChk.getBoundingClientRect();
      inside = (clientY < bwR.bottom); /* strict < : exits at first pixel below card */
      if (inside) blkId = pItem.type==='block' ? pItem.id : pItem.blockId;
    }
  }

  var key = ins+'_'+(blkId||'')+'_'+inside;
  if (key===_drag.curStateKey) return;
  _drag.curStateKey=key; _drag.curOverIdx=ins; _drag.forceOutsideBlock=!inside;

  /* Clear */
  domItems.forEach(function(el){ el.classList.remove('te-drag-over','te-drop-after'); });
  _drag.listEl.querySelectorAll('.te-block-wrap').forEach(function(bw){
    bw.classList.remove('te-block-drop-target','te-block-empty-target');
  });

  /* ── Apply visual ──────────────────────────────────────────────────
     INSIDE  → te-drop-after  (border-bottom) on item ABOVE = line stays inside card
     OUTSIDE → te-drag-over   (border-top)    on item BELOW = line appears outside card
     No overlap: one class, one item, one visual position             */
  if (inside) {
    if (pdi>=0) domItems[pdi].classList.add('te-drop-after');
    /* Block card highlight */
    var bwT = pdi>=0 ? domItems[pdi].closest('.te-block-wrap') : (ndi<domItems.length ? domItems[ndi].closest('.te-block-wrap') : null);
    if (bwT) bwT.classList.add('te-block-drop-target');
  } else {
    if (ndi<domItems.length) domItems[ndi].classList.add('te-drag-over');
    else if (pdi>=0) domItems[pdi].classList.add('te-drop-after');
  }
}

function onDragEnd(e) {
  if (!_drag) return;
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup',   onDragEnd);
  document.removeEventListener('touchmove', onDragMove);
  document.removeEventListener('touchend',  onDragEnd);
  var sk = _drag.sk, fromIdx = _drag.idx;
  var toIdx = _drag.curOverIdx;
  var dropIntoBlockIdx = _drag.dropIntoBlockIdx || -1;
  var forceOutsideBlock = !!_drag.forceOutsideBlock; /* save before _drag=null */
  var wasDrag = _drag.started;
  _drag.el.classList.remove('te-dragging');
  var bw0 = _drag.el.closest ? _drag.el.closest('.te-block-wrap') : null;
  if (bw0) bw0.classList.remove('te-block-dragging');
  _drag.listEl.querySelectorAll('.te-item').forEach(function(el){ el.classList.remove('te-drag-over','te-drop-after'); });
  _drag.listEl.querySelectorAll('.te-block-wrap').forEach(function(bw){
    bw.classList.remove('te-block-drop-target','te-block-drop-into','te-block-empty-target');
  });
  /* Remove drag lock so inline-add can appear again */
  _drag.listEl.removeAttribute('data-te-dragging');
  _drag = null;
  if (wasDrag) { _dragJustEnded = true; setTimeout(function(){ _dragJustEnded = false; }, 200); }

  if (!wasDrag) {
    var cur = ST.tmplActiveItem;
    var isSame = cur && cur.sk===sk && cur.ii===fromIdx;
    if (isSame) { deactivateAllItems(); }
    else {
      activateItem(sk, fromIdx);
      setTimeout(function(){
        var inp = document.querySelector(
          '.te-item-inp.te-inp[data-sk="'+sk+'"][data-ii="'+fromIdx+'"], '+
          '.te-desc-area.te-inp[data-sk="'+sk+'"][data-ii="'+fromIdx+'"]'
        );
        if (inp) inp.focus();
      }, 20);
    }
    return;
  }

  var sectionItems = ST.tmplEditData.sections[sk];
  if (!sectionItems) return;
  pushTmplHistory();

  /* Standard insertion — standard adoption handles blockId assignment */
  /* No special case needed: adoption scans backward and finds block context */

  if (toIdx === -1 || toIdx === fromIdx || toIdx === fromIdx + 1) {
    var items0 = ST.tmplEditData.sections[sk];
    if (items0 && items0[fromIdx]) {
      if (forceOutsideBlock && items0[fromIdx].blockId) {
        /* Moved outside block: strip blockId */
        pushTmplHistory();
        delete items0[fromIdx].blockId;
        refreshTmplEditor();
      } else if (!forceOutsideBlock) {
        /* May need to assign blockId if dropping into a block at same position */
        var scanItems = items0;
        var insRef = toIdx > fromIdx ? toIdx - 1 : (toIdx === -1 ? fromIdx : toIdx);
        var adoptId = null;
        for (var bi0 = insRef - 1; bi0 >= 0; bi0--) {
          if (scanItems[bi0] && scanItems[bi0].type === 'block') { adoptId = scanItems[bi0].id; break; }
          if (scanItems[bi0] && scanItems[bi0].blockId) { adoptId = scanItems[bi0].blockId; break; }
          if (scanItems[bi0] && !scanItems[bi0].blockId && scanItems[bi0].type !== 'block') break;
        }
        var checkAfter0 = insRef + 1;
        if (!adoptId && checkAfter0 < scanItems.length && scanItems[checkAfter0] && scanItems[checkAfter0].blockId) {
          adoptId = scanItems[checkAfter0].blockId;
        }
        if (adoptId && !items0[fromIdx].blockId) {
          pushTmplHistory();
          items0[fromIdx].blockId = adoptId;
          refreshTmplEditor();
        }
      }
    }
    return;
  }
  var items = ST.tmplEditData.sections[sk];
  pushTmplHistory();
  if (items[fromIdx] && items[fromIdx].type === 'block') {
    /* Move block header + all its blockId children together */
    var blkMoveId = items[fromIdx].id;
    var group = [], restBefore = [], restAfter = [];
    var pastFrom = false;
    items.forEach(function(it, i){
      if (i === fromIdx) { group.push(it); pastFrom=true; return; }
      if (pastFrom && it.blockId === blkMoveId) { group.push(it); return; }
      if (!pastFrom) restBefore.push(it); else restAfter.push(it);
    });
    var remainder = restBefore.concat(restAfter);
    var insertAt = toIdx > fromIdx ? toIdx - group.length : toIdx;
    if (insertAt < 0) insertAt = 0;
    if (insertAt > remainder.length) insertAt = remainder.length;
    ST.tmplEditData.sections[sk] = remainder.slice(0,insertAt).concat(group).concat(remainder.slice(insertAt));
  } else {
    /* Individual item move */
    var moved = items.splice(fromIdx, 1)[0];
    var insertAt2 = toIdx > fromIdx ? toIdx - 1 : toIdx;
    if (insertAt2 < 0) insertAt2 = 0;
    if (insertAt2 > items.length) insertAt2 = items.length;
    items.splice(insertAt2, 0, moved);

    /* Detect if the drop position is inside a block → adopt the item into that block */
    var adoptBlockId = null;
    /* Scan from insertAt2 backward to find nearest block header */
    for (var bi = insertAt2 - 1; bi >= 0; bi--) {
      if (items[bi] && items[bi].type === 'block') {
        adoptBlockId = items[bi].id; break;
      }
      if (items[bi] && items[bi].blockId) {
        adoptBlockId = items[bi].blockId; break;
      }
      /* Hit a non-block, non-child item before finding a block — not inside block */
      if (items[bi] && !items[bi].blockId && items[bi].type !== 'block') {
        break;
      }
    }
    /* Check item AFTER the inserted position (skip the moved item itself) */
    var afterBlockId = null;
    var checkAfter = insertAt2 + 1;
    if (checkAfter < items.length && items[checkAfter] && items[checkAfter].blockId) {
      afterBlockId = items[checkAfter].blockId;
    }
    var finalBlockId = afterBlockId || adoptBlockId || null;

    if (forceOutsideBlock) finalBlockId = null;

    if (finalBlockId && moved.type !== 'block') {
      /* Item dropped inside a block → adopt it */
      moved.blockId = finalBlockId;
    } else if (!finalBlockId && moved.blockId) {
      /* Item dragged OUT of a block → remove blockId */
      delete moved.blockId;
    }
  }
  refreshTmplEditor();
}

/* ══════════════════════════════════
   EDITOR ACTIVE STATE (DOM-only, no full re-render)
══════════════════════════════════ */
function deactivateAllItems(){
  document.querySelectorAll('.te-item-active').forEach(function(el){
    el.classList.remove('te-item-active');
  });
  document.querySelectorAll('.te-inline-add').forEach(function(el){
    el.style.display = 'none';
  });
  document.querySelectorAll('.te-memo-inp').forEach(function(el){
    if (!el.value) el.style.display = 'none';
  });
  /* Hide dynamically injected block swatches */
  document.querySelectorAll('.blk-swatches').forEach(function(el){
    el.style.display = 'none';
  });
  ST.tmplActiveItem = null;
}

function activateItem(sk, ii){
  deactivateAllItems();
  var el = document.querySelector('.te-item[data-sk="'+sk+'"][data-ii="'+ii+'"]');
  if (!el) return;
  el.classList.add('te-item-active');
  ST.tmplActiveItem = {sk:sk, ii:ii};

  var isBlock = el.classList.contains('te-item-block');
  if (isBlock) {
    /* Show inline-add inside te-block-children */
    var blockChildren = el.parentNode.querySelector('.te-block-children');
    if (blockChildren) {
      var addRow = blockChildren.querySelector('.te-inline-add');
      if (addRow) addRow.style.display = '';
    }
    /* Show memo (it's inside the flex column in te-item-block) */
    var blockMemo = el.querySelector('.te-memo-inp');
    if (blockMemo) blockMemo.style.display = '';
    /* Remove ALL existing blk-swatches in the entire editor before injecting new ones */
    document.querySelectorAll('.blk-swatches').forEach(function(s){ s.remove(); });
    /* Inject swatches AFTER te-item-block el (between title row and children) */
    var wrap = el.closest('.te-block-wrap');
    if (wrap) {
      var item = ST.tmplEditData.sections[sk] && ST.tmplEditData.sections[sk][ii];
      var savedClr = (item && item.color) || '';
      var TBLOCK_PRESETS_LOCAL = ['#ffd6d6','#ffe8cc','#fffacc','#d6f5d6','#cce8ff','#e8ccff','#ffd6f0','#d6f0f5','#dde8ff','#ffeedd'];
      var swHtml = '<div class="blk-swatches" style="display:flex;gap:3px;flex-wrap:nowrap;overflow-x:auto;margin:4px 0 2px;padding-bottom:2px">';
      TBLOCK_PRESETS_LOCAL.forEach(function(c){
        swHtml += '<div class="te-swatch'+(c===savedClr?' sel':'')+'" data-sk="'+sk+'" data-ii="'+ii+'" data-color="'+c+'" style="background:'+c+'"></div>';
      });
      swHtml += '</div>';
      var div = document.createElement('div');
      div.innerHTML = swHtml;
      /* Insert AFTER the .te-item-block, BEFORE .te-block-children */
      var blockChildrenDiv = wrap.querySelector('.te-block-children');
      wrap.insertBefore(div.firstChild, blockChildrenDiv);
      /* Bind swatches */
      wrap.querySelectorAll('.te-swatch').forEach(function(sw){
        sw.onclick = function(){
          var item2 = ST.tmplEditData.sections[this.dataset.sk][parseInt(this.dataset.ii)];
          item2.color = this.dataset.color;
          pushTmplHistory();
          refreshTmplEditor();
        };
      });
    }
  } else {
    /* Regular item: inline-add is next sibling */
    var addRow = el.nextElementSibling;
    if (addRow && addRow.classList.contains('te-inline-add')) addRow.style.display = '';
    var memo = el.querySelector('.te-memo-inp');
    if (memo) memo.style.display = '';
  }
}

function refreshTmplEditor(){
  var existing = document.getElementById('tedit-el');
  if (!existing) return;
  var wasOpen = existing.classList.contains('open');
  /* Save scroll position before destroying DOM */
  var savedScroll = 0;
  var oldBody = existing.querySelector('.tedit-body');
  if (oldBody) savedScroll = oldBody.scrollTop;
  existing.remove();
  document.getElementById('app').insertAdjacentHTML('beforeend', renderTmplEditor());
  var el = document.getElementById('tedit-el');
  if (wasOpen) el.classList.add('open');
  /* Restore scroll position immediately */
  if (savedScroll > 0) {
    var newBody = el.querySelector('.tedit-body');
    if (newBody) newBody.scrollTop = savedScroll;
  }
  bindTmplEditor();
  /* Initially hide all inline-add rows and memos; shown only on active */
  document.querySelectorAll('.te-inline-add').forEach(function(r){ r.style.display='none'; });
  document.querySelectorAll('.te-memo-inp').forEach(function(m){ if(!m.value) m.style.display='none'; });
  /* Re-activate item if ST.tmplActiveItem is set (e.g. after data change) */
  if (ST.tmplActiveItem) {
    activateItem(ST.tmplActiveItem.sk, ST.tmplActiveItem.ii);
  }
}

  noBtn.style.cssText = 'flex:1;padding:8px;border-radius:10px;border:1.5px solid rgba(180,170,220,.4);background:transparent;color:var(--muted,#8878b8);font-size:13px;font-weight:700;cursor:pointer';

function duplicateItem(sk, ii){
  var items = ST.tmplEditData.sections[sk];
  if (!items) return;
  var item = items[ii];
  if (!item) return;
  pushTmplHistory();

  var ts = Date.now();
  var cloneItem = function(src, suffix){
    var c = Object.assign({}, src, {id: src.id+'_d'+suffix});
    if (c.blockId) c.blockId = c.blockId+'_d'+suffix;
    return c;
  };

  var toCopy = [cloneItem(item, ts)];

  /* If block: also copy all children */
  if (item.type === 'block') {
    for (var ci = ii+1; ci < items.length; ci++) {
      if (items[ci].blockId === item.id) {
        toCopy.push(cloneItem(items[ci], ts));
      } else break;
    }
    /* Fix child blockIds to point to new block */
    var newBlockId = toCopy[0].id;
    for (var j=1; j<toCopy.length; j++) toCopy[j].blockId = newBlockId;
  }

  /* Insert after original (+ its children) */
  var insertAfter = ii + (toCopy.length > 1 ? (item.type==='block' ? toCopy.length-1 : 0) : 0);
  /* Find actual end of original group */
  insertAfter = ii;
  if (item.type === 'block') {
    for (var k = ii+1; k < items.length; k++) {
      if (items[k].blockId === item.id) insertAfter = k; else break;
    }
  }

  var args = [insertAfter+1, 0].concat(toCopy);
  Array.prototype.splice.apply(items, args);

  refreshTmplEditor();
  showToast('복제됨 ✓');
}

function bindTmplEditor(){
  document.getElementById('btn-close-tedit').onclick = closeTmplEditor;
  document.getElementById('tedit-name').oninput = function(){ ST.tmplEditData.name = this.value; pushHistDebounced(); };

  document.querySelectorAll('.te-inp').forEach(function(inp){
    inp.oninput = function(){
      var sk = this.dataset.sk, ii = parseInt(this.dataset.ii), field = this.dataset.field;
      if (!ST.tmplEditData.sections[sk]) return;
      var item = ST.tmplEditData.sections[sk][ii];
      if (field === 'time' && this.value) item.timeText = '';
      if (field === 'timeText' && this.value) item.time = '';
      item[field] = this.value;
      pushHistDebounced();
    };
    if (inp.tagName === 'INPUT' && inp.type === 'text' && inp.dataset.field === 'text') {
      /* Temp edit mode: focus text input → hide add row + memo ONLY when not in full-edit */
      inp.onfocus = function(){
        var item = this.closest('.te-item');
        if (!item) return;
        var isFullEdit = item.classList.contains('te-item-active');
        if (!isFullEdit) {
          /* Temp mode: hide add row */
          var addRow = item.nextElementSibling;
          if (addRow && addRow.classList.contains('te-inline-add')) addRow.style.display = 'none';
          /* Hide memo */
          var memo = this.parentNode.querySelector('.te-memo-inp');
          if (memo) memo.style.display = 'none';
        }
      };
      inp.onblur = function(){
        var item = this.closest('.te-item');
        if (!item) return;
        var isFullEdit = item.classList.contains('te-item-active');
        /* Restore add row only if full edit mode */
        var addRow = item.nextElementSibling;
        if (addRow && addRow.classList.contains('te-inline-add') && isFullEdit) {
          addRow.style.display = '';
        }
        /* Restore memo only if full edit mode */
        if (isFullEdit) {
          var memo = this.parentNode.querySelector('.te-memo-inp');
          if (memo) memo.style.display = '';
        }
      };
      inp.onkeydown = function(e){
        if (e.key !== 'Enter') return;
        e.preventDefault();
        var sk = this.dataset.sk;
        var curIdx = parseInt(this.dataset.ii);
        var curItem = ST.tmplEditData.sections[sk] && ST.tmplEditData.sections[sk][curIdx];
        pushTmplHistory();
        var newItem = {id:sk+Date.now(), type:'check', text:'', checked:false};
        /* If current item is a block, new child inherits blockId */
        if (curItem && curItem.type === 'block') {
          newItem.blockId = curItem.id;
        } else if (curItem && curItem.blockId) {
          /* If inside a block, new sibling also gets blockId */
          newItem.blockId = curItem.blockId;
        }
        if (!ST.tmplEditData.sections[sk]) ST.tmplEditData.sections[sk] = [];
        ST.tmplEditData.sections[sk].splice(curIdx+1, 0, newItem);
        ST.tmplActiveItem = null;
        refreshTmplEditor();
        setTimeout(function(){
          var inputs = document.querySelectorAll('.te-item-inp.te-inp[data-sk="'+sk+'"][data-ii="'+(curIdx+1)+'"]');
          if (inputs.length) inputs[0].focus();
        }, 30);
      };
    }
  });

  /* Time mode toggle (picker ↔ text) */
  document.querySelectorAll('.te-time-mode').forEach(function(btn){
    btn.onclick = function(){
      var sk = this.dataset.sk, ii = parseInt(this.dataset.ii), mode = this.dataset.mode;
      var item = ST.tmplEditData.sections[sk][ii];
      pushTmplHistory();
      item.timeMode = mode;
      /* clear the other field when switching */
      if (mode === 'picker') item.timeText = '';
      else item.time = '';
      refreshTmplEditor();
      /* re-focus the input */
      var sel = mode === 'picker' ? '.te-time-inp.te-inp[data-ii="'+ii+'"][data-sk="'+sk+'"]' : '.te-time-text.te-inp[data-ii="'+ii+'"][data-sk="'+sk+'"]';
      var inp = document.querySelector(sel);
      if (inp) inp.focus();
    };
  });

  /* Color swatch click (timeblock color picker) */
  document.querySelectorAll('.te-swatch').forEach(function(sw){
    sw.onclick = function(){
      var sk=this.dataset.sk, ii=parseInt(this.dataset.ii), color=this.dataset.color;
      pushTmplHistory();
      ST.tmplEditData.sections[sk][ii].color=color;
      refreshTmplEditor();
    };
  });

  document.querySelectorAll('.tedit-tab').forEach(function(btn){
    btn.onclick = function(){
      ST.tmplEditSection = this.dataset.sk;
      ST.tmplActiveItem = null;
      refreshTmplEditor();
    };
  });

  /* Inline add chips — insert after a specific item */
  document.querySelectorAll('.te-add-link[data-after]').forEach(function(btn){
    btn.onclick = function(e){
      e.stopPropagation();
      var sk=this.dataset.sk, after=parseInt(this.dataset.after), type=this.dataset.type, bid=this.dataset.bid||'', newItem;
      if(type==='timeline') newItem={id:sk+Date.now(),type:'timeline',time:'',timeText:'',timeMode:'picker',text:''};
      else if(type==='check') newItem={id:sk+Date.now(),type:'check',text:'',checked:false};
      else if(type==='block'){
        var blkId='blk_'+sk+Date.now();
        newItem={id:blkId,type:'block',text:''};
        pushTmplHistory();
        if(!ST.tmplEditData.sections[sk]) ST.tmplEditData.sections[sk]=[];
        ST.tmplEditData.sections[sk].splice(after+1,0,newItem);
        ST.tmplActiveItem={sk:sk,ii:after+1};
        refreshTmplEditor();
        var inp=document.querySelector('.te-item-inp.te-inp[data-ii="'+(after+1)+'"]');
        if(inp) inp.focus();
        return;
      }
      else newItem={id:sk+Date.now(),type:'desc',text:''};
      if(bid) newItem.blockId=bid;
      if(!ST.tmplEditData.sections[sk]) ST.tmplEditData.sections[sk]=[];
      pushTmplHistory();
      ST.tmplEditData.sections[sk].splice(after+1,0,newItem);
      ST.tmplActiveItem={sk:sk,ii:after+1};
      refreshTmplEditor();
      /* focus new item's text input */
      var sel = type==='check'?'.te-item-inp.te-inp[data-ii="'+(after+1)+'"]':
                type==='desc'?'.te-desc-area.te-inp[data-ii="'+(after+1)+'"]':
                type==='timeline'?'.te-time-inp.te-inp[data-ii="'+(after+1)+'"]':
                '.te-item-inp.te-inp[data-ii="'+(after+1)+'"]';
      var inp=document.querySelector(sel);
      if(inp)inp.focus();
    };
  });

  /* End-of-list chips — append to section */
  document.querySelectorAll('.te-end-chip').forEach(function(btn){
    btn.onclick = function(e){
      e.stopPropagation();
      var sk=this.dataset.sk, type=this.dataset.type, newItem;
      if(type==='timeline') newItem={id:sk+Date.now(),type:'timeline',time:'',timeText:'',timeMode:'picker',text:''};
      else if(type==='check') newItem={id:sk+Date.now(),type:'check',text:'',checked:false};
      else if(type==='block'){
        var blkId2='blk_'+sk+Date.now();
        newItem={id:blkId2,type:'block',text:''};
        pushTmplHistory();
        if(!ST.tmplEditData.sections[sk]) ST.tmplEditData.sections[sk]=[];
        ST.tmplEditData.sections[sk].push(newItem);
        var newIdx=ST.tmplEditData.sections[sk].length-1;
        ST.tmplActiveItem={sk:sk,ii:newIdx};
        refreshTmplEditor();
        return;
      }
      else newItem={id:sk+Date.now(),type:'desc',text:''};
      if(!ST.tmplEditData.sections[sk]) ST.tmplEditData.sections[sk]=[];
      pushTmplHistory();
      ST.tmplEditData.sections[sk].push(newItem);
      var newIdx=ST.tmplEditData.sections[sk].length-1;
      ST.tmplActiveItem={sk:sk,ii:newIdx};
      refreshTmplEditor();
      var body=document.querySelector('.tedit-body');
      if(body) body.scrollTo({top:body.scrollHeight,behavior:'smooth'});
    };
  });

  /* Item row click:
     - drag handle → handled by DnD system
     - anywhere else → clear active state from any other item first */
  document.querySelectorAll('.te-item[data-ii]').forEach(function(el){
    el.onclick = function(e){
      /* Suppress click that fires right after a drag */
      if (_dragJustEnded) return;
      var sk=this.dataset.sk, ii=parseInt(this.dataset.ii);
      var wasActive = ST.tmplActiveItem && ST.tmplActiveItem.sk===sk && ST.tmplActiveItem.ii===ii;
      if (!wasActive) {
        /* Clear everything — brute force DOM clean */
        document.querySelectorAll('.te-item-active').forEach(function(a){ a.classList.remove('te-item-active'); });
        document.querySelectorAll('.te-inline-add').forEach(function(a){ a.style.display='none'; });
        document.querySelectorAll('.te-memo-inp').forEach(function(a){ if(!a.value) a.style.display='none'; });
        document.querySelectorAll('.blk-swatches').forEach(function(a){ a.style.display='none'; });
        ST.tmplActiveItem = null;
      }
      /* Now ignore drag handle clicks (DnD handles those) */
      if(e.target.classList.contains('te-drag-handle')||e.target.closest('.te-drag-handle')) return;
      /* Buttons handled elsewhere */
      if(e.target.tagName==='BUTTON') return;
      /* Input/textarea → already focused by browser, nothing else to do */
    };
  });


  /* Reflection count buttons (3/4/5 selector) */
  document.querySelectorAll('.te-cnt-btn').forEach(function(btn){
    btn.onclick = function(){
      var field=this.dataset.field, val=parseInt(this.dataset.val);
      if(!ST.tmplEditData.reflConfig) ST.tmplEditData.reflConfig={};
      ST.tmplEditData.reflConfig[field]=val;
      pushHistDebounced();
      refreshTmplEditor();
    };
  });

  document.querySelectorAll('.te-refl-inp, .te-refl-sel').forEach(function(inp){
    inp.onchange = inp.oninput = function(){
      var field = this.dataset.field;
      if (!ST.tmplEditData.reflConfig) ST.tmplEditData.reflConfig = {};
      var val = this.tagName==='SELECT' ? parseInt(this.value) : this.value;
      ST.tmplEditData.reflConfig[field] = val;
      pushHistDebounced();
    };
  });

  /* Timeblock toggle on timeline */

  document.querySelectorAll('.te-item-del').forEach(function(btn){
    btn.onclick = function(){
      var sk = this.dataset.sk, ii = parseInt(this.dataset.ii);
      pushTmplHistory();
      ST.tmplEditData.sections[sk].splice(ii, 1);
      ST.tmplActiveItem = null;
      refreshTmplEditor();
    };
  });

  /* Undo / Redo */
  document.getElementById('btn-te-undo').onclick = undoTmpl;
  document.getElementById('btn-te-redo').onclick = redoTmpl;
  updateHistoryBtns();

  document.getElementById('btn-te-save').onclick = function(){
    var name = ST.tmplEditData.name.trim();
    if (!name){ showToast('템플릿 이름을 입력해주세요'); return; }

    var tmplToSave = ST.tmplEditData;
    var isDefault = (tmplToSave.id === getDefaultTmplId());
    var actuallyChanged = (JSON.stringify(tmplToSave) !== (ST.tmplEditOriginal||''));

    function doSave(){
      saveTmpl(tmplToSave);
      if(isDefault && actuallyChanged){
        try{
          var defId=tmplToSave.id;
          var today=todayStr();
          var keys=[];
          for(var i=0;i<localStorage.length;i++){
            var k=localStorage.key(i);
            if(k&&k.match(/^drt:\d{4}-\d{2}-\d{2}$/)) keys.push(k);
          }
          keys.forEach(function(k){
            var ds=k.replace('drt:','');
            var day=S.load(ds);
            if(!day) return;
            /* 오늘은 무조건 적용, 나머지는 기록 없는 날짜만 */
            var isEligible = (ds===today) || !S.hasReal(ds);
            if(!isEligible) return;
            SECTIONS.forEach(function(s){
              var items=tmplToSave.sections[s.key]||[];
              day.routines[s.key]=items.map(function(item){
                var copy=Object.assign({},item);
                if(copy.type==='check') copy.checked=false;
                return copy;
              });
            });
            S.save(ds,day);
          });
          /* 현재 열려있는 데일리창이 기록 없으면 즉시 재렌더 */
          if(ST.page==='day' && ST.currentDate && !S.hasReal(ST.currentDate)){
            ST.dayData=getDay(ST.currentDate);
            var dayEl=document.querySelector('#pg-day');
            if(dayEl){
              var tmp=document.createElement('div');
              tmp.innerHTML=renderDay();
              dayEl.replaceWith(tmp.firstChild);
              bindDay(); bindDaySections();
            }
          }
        }catch(e){}
      }
      showToast('저장됨: '+name);
      closeTmplEditor();
      var panelEl=document.getElementById('tpanel-el');
      if(panelEl){
        var wasOpen=panelEl.classList.contains('open');
        panelEl.remove();
        document.getElementById('app').insertAdjacentHTML('beforeend',renderTmplPanel());
        if(wasOpen){requestAnimationFrame(function(){var el=document.getElementById('tpanel-el');if(el)el.classList.add('open');});}
        bindTmplPanel();
      }
    }

    /* 변경 없으면 경고창 없이 그냥 저장 */
    if(isDefault && actuallyChanged){
      var old=document.getElementById('tmpl-confirm-popup');
      if(old) old.remove();
      var pop=document.createElement('div');
      pop.id='tmpl-confirm-popup';
      pop.style.cssText='position:fixed;z-index:9999;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35)';
      pop.innerHTML='<div style="background:#fff;border-radius:18px;padding:22px 20px;max-width:300px;width:90%;box-shadow:0 8px 32px rgba(80,60,160,.22)">'
        +'<div style="font-size:15px;font-weight:800;color:#2a1f5a;margin-bottom:10px">템플릿 변경 확인</div>'
        +'<div style="font-size:13px;color:#555;line-height:1.6;margin-bottom:18px">⚠️ 템플릿을 변경하면 오늘 날짜부터 기록된 내용이 초기화됩니다.<br><span style="font-size:11px;color:#888">(어제까지의 기록만 유지됩니다.)</span><br><br>그래도 변경하시겠습니까?</div>'
        +'<div style="display:flex;gap:10px">'
        +'<button id="tmpl-confirm-yes" style="flex:1;padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,rgba(139,127,212,.9),rgba(59,159,214,.8));color:#fff;font-size:14px;font-weight:800;cursor:pointer">변경</button>'
        +'<button id="tmpl-confirm-no" style="flex:1;padding:10px;border-radius:10px;border:1.5px solid rgba(180,170,220,.4);background:transparent;color:#8878b8;font-size:14px;font-weight:700;cursor:pointer">취소</button>'
        +'</div></div>';
      document.body.appendChild(pop);
      document.getElementById('tmpl-confirm-yes').onclick=function(){pop.remove();doSave();};
      document.getElementById('tmpl-confirm-no').onclick=function(){pop.remove();};
      pop.onclick=function(e){if(e.target===pop)pop.remove();};
    } else {
      doSave();
    }
  };

  document.getElementById('btn-te-load').onclick = function(){ openTmplLoadPopup(); };

  initEditorDnD();
}

/* ══════════════════════════════════
   TEMPLATE LOAD POPUP
══════════════════════════════════ */
function openTmplLoadPopup(){
  var existing=document.getElementById('tpopup-el');
  if(existing)existing.remove();
  var tedit=document.getElementById('tedit-el');
  if(!tedit)return;

  var tmpls=getTmpls();
  var itemsH=tmpls.map(function(t){
    var n=countTmplItems(t);
    return '<div class="tpopup-item" data-tid="'+t.id+'">'+
      '<div style="flex:1">'+
        '<div class="tpopup-item-name">'+esc(t.name)+'</div>'+
        '<div class="tpopup-item-sub">체크항목 '+n+'개</div>'+
      '</div>'+
      '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 7h4m0 0l-2-2m2 2l-2 2" stroke="#8b7fd4" stroke-width="1.5" stroke-linecap="round"/></svg>'+
    '</div>';
  }).join('');

  var html='<div class="tpopup-overlay" id="tpopup-el">'+
    '<div class="tpopup">'+
      '<div class="tpopup-title"><span>📂</span>템플릿 불러오기</div>'+
      itemsH+
      '<button class="btn-add-row" id="btn-close-tpopup" style="margin-top:12px;padding:9px">취소</button>'+
    '</div>'+
  '</div>';

  tedit.insertAdjacentHTML('beforeend',html);
  requestAnimationFrame(function(){
    var el=document.getElementById('tpopup-el');
    if(el)el.classList.add('open');
  });

  document.getElementById('btn-close-tpopup').onclick=closeTmplLoadPopup;
  document.getElementById('tpopup-el').onclick=function(e){if(e.target===this)closeTmplLoadPopup();};

  document.querySelectorAll('.tpopup-item[data-tid]').forEach(function(el){
    el.onclick=function(){
      var tid=this.dataset.tid;
      var src=getTmplById(tid);
      if(!src)return;
      /* Deep copy sections into editor data (keep current id/name) */
      var newSections={};
      Object.keys(src.sections).forEach(function(k){
        newSections[k]=src.sections[k].map(function(item){return Object.assign({},item);});
      });
      ST.tmplEditData.sections=newSections;
      closeTmplLoadPopup();
      refreshTmplEditor();
      showToast(src.name+' 불러옴');
    };
  });
}

function closeTmplLoadPopup(){
  var el=document.getElementById('tpopup-el');
  if(el){el.classList.remove('open');setTimeout(function(){el.remove();},200);}
}

getTmpls();
render();
